<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연습용 작업일보 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .team-section { margin-bottom: 35px; }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .team-title { font-weight: bold; font-size: 1.1rem; color: var(--text); }
        .excel-table { width: 100%; border-collapse: collapse; background: var(--card); margin-bottom: 10px; table-layout: fixed; border: 2px solid #4b5563; }
        .excel-table td { border: 1px solid #4b5563; text-align: center; height: 38px; font-size: 0.85rem; padding: 0; }
        .name-cell { width: 75px; background: #1a202c; padding: 0 !important; }
        .name-wrapper { display: flex; align-items: center; justify-content: center; height: 152px; width: 100%; flex-direction: column; }
        .name-input { width: 95%; border: none; background: transparent; color: white; text-align: center; font-weight: bold; font-size: 0.85rem; resize: none; box-sizing: border-box; word-break: break-all; overflow: hidden; outline: none; padding: 0; line-height: 1.3; }
        .date-num { background: #2d3748; font-size: 0.75rem; font-weight: bold; color: #d1d5db; }
        .sun { color: #ff4d4d !important; } 
        .sat { color: #4dadff !important; }
        .gongsu-cell { cursor: pointer; transition: 0.1s; -webkit-user-select: none; user-select: none; font-weight: bold; font-size: 0.9rem; }
        .gongsu-cell:active { background: var(--primary); }
        .gongsu-cell.filled { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .label-sum { background: #1a202c; color: var(--text); font-weight: bold; font-size: 0.8rem; }
        .val-sum { background: #1a202c; color: var(--primary); font-weight: bold; font-size: 0.9rem; }
        .team-total-bar { text-align: right; padding: 12px; font-size: 0.95rem; color: #f3f4f6; background: rgba(59, 130, 246, 0.1); border-radius: 10px; border: 1px solid rgba(59, 130, 246, 0.2); margin-bottom: 5px; }

        .history-card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .history-info { display: flex; flex-direction: column; gap: 4px; }
        .history-date { font-size: 0.8rem; color: var(--primary); font-weight: bold; }
        .history-site { font-size: 1.05rem; font-weight: bold; color: var(--text); }
        .history-btns { display: flex; gap: 8px; }
        .btn-history { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 0.85rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-load { background: #4b5563; }
        .btn-excel { background: var(--success); }
        .btn-delete { background: #991b1b; flex: 0.4; }
    </style>
</head>
<body>
<div class="container">
    <div class="btn-home" onclick="location.href='index.html'">🏠 메인으로</div>
    
    <div class="card">
        <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
            <span>🧪 연습용 현황 설정</span>
            <button onclick="addTeam()" class="btn-circle" style="font-size:0.75rem; width:auto; padding:0 12px; border-radius:10px;">+ 팀 추가</button>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="month" id="logMonth" style="flex:1; margin-bottom:0;">
            <input type="text" id="siteName" placeholder="연습용 현장명" style="flex:1; margin-bottom:0;">
        </div>
    </div>

    <div id="team-container"></div>

    <div style="display:flex; gap:10px; margin-bottom:30px;">
        <button class="btn-main" onclick="saveMonthlyLog()" style="background:var(--success); flex:2;">서버에 저장하기 (덮어쓰기) 💾</button>
        <button class="btn-main" onclick="saveAsNew()" style="background:var(--primary); flex:1; font-size:0.85rem;">새 파일로 저장 (복사) 📂</button>
    </div>

    <div class="section-title" style="margin-bottom:15px;">📂 연습용 불러오기 / 내역</div>
    <div id="history-list"></div>
</div>

<script>
    let myEmail, myTeamId, editingId = null;
    let teamData = [
        { teamName: "목공팀", workers: [] },
        { teamName: "도장팀", workers: [] }
    ];

    document.getElementById('logMonth').value = new Date().toISOString().substring(0, 7);

    auth.onAuthStateChanged(async user => { 
        if (user) { myEmail = user.email; await findTeam(); loadHistory(); renderAllTeams(); } 
        else { location.href='index.html'; } 
    });

    async function findTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { myTeamId = q.docs[0].id; }
    }

    function getDayClass(year, month, day) {
        const d = new Date(year, month - 1, day);
        if (d.getDay() === 0) return 'sun';
        if (d.getDay() === 6) return 'sat';
        return '';
    }

    function renderAllTeams() {
        const container = document.getElementById('team-container');
        const [year, month] = document.getElementById('logMonth').value.split('-').map(Number);
        const lastDay = new Date(year, month, 0).getDate();
        
        container.innerHTML = teamData.map((team, tIdx) => {
            let teamTotal = 0;
            const tables = team.workers.map((w, wIdx) => {
                let pSum = 0;
                Object.values(w.days).forEach(v => pSum += parseFloat(v || 0));
                teamTotal += pSum;

                return `
                <table class="excel-table">
                    <tr>
                        <td rowspan="4" class="name-cell">
                            <div class="name-wrapper">
                                <textarea class="name-input" placeholder="이름" onchange="updateName(${tIdx}, ${wIdx}, this.value)">${w.name}</textarea>
                                <button onclick="removeWorker(${tIdx}, ${wIdx})" style="background:#991b1b; color:white; border:none; border-radius:5px; font-size:0.65rem; padding:3px 8px; cursor:pointer; margin-top:5px;">삭제</button>
                            </div>
                        </td>
                        ${loopDays(year, month, 1, 16, 'date')}
                    </tr>
                    <tr>${loopDays(year, month, 1, 16, 'input', tIdx, wIdx)}</tr>
                    <tr>
                        ${loopDays(year, month, 17, 31, 'date', 0, 0, lastDay)}
                        <td class="label-sum">계</td>
                    </tr>
                    <tr>
                        ${loopDays(year, month, 17, 31, 'input', tIdx, wIdx, lastDay)}
                        <td class="val-sum">${pSum % 1 === 0 ? pSum : pSum.toFixed(1)}</td>
                    </tr>
                </table>`;
            }).join('');

            return `
            <div class="team-section">
                <div class="team-header">
                    <span class="team-title">${team.teamName} 인원 명단</span>
                    <button class="btn-circle" onclick="addWorker(${tIdx})">+</button>
                </div>
                ${tables}
                <div class="team-total-bar">${team.teamName} 합계 공수: <b>${teamTotal % 1 === 0 ? teamTotal : teamTotal.toFixed(1)}</b></div>
            </div>`;
        }).join('');
        bindLongPress();
    }

    function loopDays(y, m, start, end, type, tIdx, wIdx, lastDay = 31) {
        let html = "";
        for (let d = start; d <= end; d++) {
            const isInvalid = d > lastDay;
            const colorClass = isInvalid ? '' : getDayClass(y, m, d);
            if (type === 'date') { html += `<td class="date-num ${colorClass}">${isInvalid ? '' : d}</td>`; }
            else {
                if (isInvalid) { html += `<td style="background:#111827;"></td>`; }
                else {
                    const val = teamData[tIdx].workers[wIdx].days[d] || "";
                    html += `<td class="gongsu-cell ${val?'filled':''}" data-t="${tIdx}" data-w="${wIdx}" data-d="${d}" onclick="handleCellClick(this)">${val}</td>`;
                }
            }
        }
        return html;
    }

    function addTeam() {
        const name = prompt("테스트할 팀 이름을 입력하세요");
        if(name) { teamData.push({ teamName: name, workers: [] }); renderAllTeams(); }
    }

    function addWorker(tIdx) { teamData[tIdx].workers.push({ name: "", days: {} }); renderAllTeams(); }
    function removeWorker(tIdx, wIdx) { teamData[tIdx].workers.splice(wIdx, 1); renderAllTeams(); }
    function updateName(tIdx, wIdx, val) { teamData[tIdx].workers[wIdx].name = val; }
    
    function handleCellClick(el) {
        const { t, w, d } = el.dataset;
        const current = parseFloat(teamData[t].workers[w].days[d] || 0);
        teamData[t].workers[w].days[d] = (current === 1 ? "" : 1);
        renderAllTeams();
    }

    function bindLongPress() {
        document.querySelectorAll('.gongsu-cell').forEach(cell => {
            let timer;
            const start = () => timer = setTimeout(() => {
                const { t, w, d } = cell.dataset;
                const input = prompt(`공수 수정`, teamData[t].workers[w].days[d]);
                if (input !== null) { teamData[t].workers[w].days[d] = input === "0" ? "" : input; renderAllTeams(); }
            }, 700);
            cell.onmousedown = cell.ontouchstart = start;
            cell.onmouseup = cell.ontouchend = () => clearTimeout(timer);
        });
    }

    // [핵심] 다른 이름으로 저장 (복사본 생성)
    async function saveAsNew() {
        editingId = null; // 기존 ID를 지워서 새로운 문서로 인식하게 함
        const site = document.getElementById('siteName');
        if(!site.value.includes("(복사)")) {
            site.value = site.value + " (복사)"; // 헷갈리지 않게 이름 뒤에 표시
        }
        await saveMonthlyLog();
    }

    async function saveMonthlyLog() {
        const month = document.getElementById('logMonth').value;
        const site = document.getElementById('siteName').value.trim();
        if(!site) return alert("현장명을 입력하세요.");
        try {
            const data = { teamId: myTeamId, month, site, teamData, updatedAt: Date.now(), writer: myEmail };
            if(editingId) {
                await db.collection("logs_test").doc(editingId).set(data);
                alert("기존 기록에 덮어씌워졌습니다.");
            } else {
                await db.collection("logs_test").add(data);
                alert("새로운 기록으로 저장되었습니다.");
            }
            location.reload();
        } catch(e) { alert(e.message); }
    }

    function loadHistory() {
        db.collection("logs_test").where("teamId","==", myTeamId).orderBy("updatedAt","desc").limit(10).onSnapshot(ss => {
            document.getElementById('history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `
                <div class="history-card">
                    <div class="history-header">
                        <div class="history-info">
                            <span class="history-date">TEST: ${d.month}</span>
                            <span class="history-site">${d.site}</span>
                        </div>
                    </div>
                    <div class="history-btns">
                        <button class="btn-history btn-load" onclick="editLog('${doc.id}')">불러오기</button>
                        <button class="btn-history btn-delete" onclick="deleteLog('${doc.id}')">삭제</button>
                    </div>
                </div>`;
            }).join('') || "연습 내역이 없습니다.";
        });
    }

    async function editLog(id) {
        const doc = await db.collection("logs_test").doc(id).get();
        const d = doc.data(); editingId = id;
        document.getElementById('logMonth').value = d.month;
        document.getElementById('siteName').value = d.site;
        teamData = d.teamData; renderAllTeams();
        window.scrollTo(0, 0);
    }

    async function deleteLog(id) { if(confirm("연습 데이터 삭제?")) await db.collection("logs_test").doc(id).delete(); }
    document.getElementById('logMonth').onchange = renderAllTeams;
</script>
</body>
</html>
