<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>김목수이야기 - 스마트 일보 (연습장)</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .team-section { margin-bottom: 35px; }
        .team-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid var(--primary); padding-bottom: 8px; }
        .team-title { font-weight: bold; font-size: 1.1rem; color: var(--text); }
        .excel-table { width: 100%; border-collapse: collapse; background: var(--card); margin-bottom: 10px; table-layout: fixed; border: 2px solid #4b5563; }
        .excel-table td { border: 1px solid #4b5563; text-align: center; height: 38px; font-size: 0.85rem; padding: 0; }
        
        /* 웹 날짜 행 높이 축소 */
        .date-row td { height: 22px !important; }
        .name-cell { width: 75px; background: #1a202c; }
        .name-wrapper { display: flex; align-items: center; justify-content: center; height: 120px; width: 100%; flex-direction: column; }
        .name-input { width: 95%; border: none; background: transparent; color: white; text-align: center; font-weight: bold; font-size: 0.85rem; resize: none; outline: none; }
        
        .date-num { background: #2d3748; font-size: 0.75rem; font-weight: bold; color: #d1d5db; }
        .sun { color: #ff4d4d !important; } .sat { color: #4dadff !important; }
        
        /* 공수 신호등 색상 */
        .gongsu-cell { cursor: pointer; font-weight: bold; font-size: 0.9rem; -webkit-user-select: none; user-select: none; transition: 0.2s; }
        .g-green { background: rgba(16, 185, 129, 0.2) !important; color: #10b981 !important; }
        .g-yellow { background: rgba(245, 158, 11, 0.2) !important; color: #f59e0b !important; }
        .g-red { background: rgba(239, 68, 68, 0.2) !important; color: #ef4444 !important; }
        
        .team-total-bar { text-align: right; padding: 12px; font-size: 0.95rem; color: #f3f4f6; background: rgba(59, 130, 246, 0.1); border-radius: 10px; border: 1px solid rgba(59, 130, 246, 0.2); }
        .history-card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .history-btns { display: flex; gap: 6px; margin-top: 15px; }
        .btn-history { flex: 1; padding: 10px 0; border-radius: 10px; border: none; font-size: 0.8rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-edit { background: #4b5563; } .btn-copy { background: #3b82f6; } .btn-excel-save { background: var(--success); }
    </style>
</head>
<body>
<div class="container">
    <div class="btn-home" onclick="location.href='index.html'">🏠 메인으로</div>
    <div class="card">
        <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
            <span>📅 현황 설정 및 내역</span>
            <button onclick="addTeam()" class="btn-circle" style="font-size:0.75rem; width:auto; padding:0 12px; border-radius:10px;">+ 팀 추가</button>
        </div>
        <div style="display:flex; gap:10px;">
            <input type="month" id="logMonth" style="flex:2; margin-bottom:0;">
            <input type="text" id="siteName" placeholder="현장명 입력" style="flex:3; margin-bottom:0;">
        </div>
    </div>
    <div id="team-container"></div>
    <button class="btn-main" onclick="saveMonthlyLog()" style="background:var(--success); margin-bottom:40px;">현장 데이터 저장하기 💾</button>
    <div class="section-title" style="margin-bottom:15px;">📂 기록 내역</div>
    <div id="history-list"></div>
</div>

<script>
    let myEmail, myTeamId, editingId = null, userNickname = "";
    let teamData = [{ teamName: "목공팀", workers: [] }, { teamName: "도장팀", workers: [] }];

    document.getElementById('logMonth').value = new Date().toISOString().substring(0, 7);

    auth.onAuthStateChanged(async user => { 
        if (user) { 
            myEmail = user.email; 
            const uDoc = await db.collection("users").doc(myEmail).get();
            userNickname = uDoc.exists ? uDoc.data().nickname : myEmail.split('@')[0];
            await findTeam(); loadHistory(); renderAllTeams(); 
        } else { location.href='index.html'; } 
    });

    async function findTeam() {
        const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
        if (!q.empty) { myTeamId = q.docs[0].id; }
    }

    function renderAllTeams() {
        const container = document.getElementById('team-container');
        const [year, month] = document.getElementById('logMonth').value.split('-').map(Number);
        const lastDay = new Date(year, month, 0).getDate();
        container.innerHTML = teamData.map((team, tIdx) => {
            let teamTotal = 0;
            const tables = team.workers.map((w, wIdx) => {
                let pSum = 0;
                Object.values(w.days).forEach(v => pSum += parseFloat(v || 0));
                teamTotal += pSum;
                return `
                <table class="excel-table">
                    <tr class="date-row">
                        <td rowspan="4" class="name-cell">
                            <div class="name-wrapper">
                                <textarea class="name-input" onchange="updateName(${tIdx}, ${wIdx}, this.value)">${w.name}</textarea>
                                <button onclick="removeWorker(${tIdx}, ${wIdx})" style="background:#991b1b; color:white; border:none; border-radius:5px; font-size:0.65rem; padding:3px 8px; cursor:pointer; margin-top:5px;">삭제</button>
                            </div>
                        </td>
                        ${loopDays(year, month, 1, 16, 'date')}
                    </tr>
                    <tr>${loopDays(year, month, 1, 16, 'input', tIdx, wIdx)}</tr>
                    <tr class="date-row">${loopDays(year, month, 17, 31, 'date', 0, 0, lastDay)}<td class="label-sum" style="background:#1a202c; color:white;">계</td></tr>
                    <tr>${loopDays(year, month, 17, 31, 'input', tIdx, wIdx, lastDay)}<td class="val-sum" style="color:var(--primary); font-weight:bold;">${pSum % 1 === 0 ? pSum : pSum.toFixed(1)}</td></tr>
                </table>`;
            }).join('');
            return `<div class="team-section"><div class="team-header"><span class="team-title">${team.teamName}</span><button class="btn-circle" onclick="addWorker(${tIdx})">+</button></div>${tables}<div class="team-total-bar">${team.teamName} 합계 공수: <b>${teamTotal % 1 === 0 ? teamTotal : teamTotal.toFixed(1)}</b></div></div>`;
        }).join('');
        bindLongPress();
    }

    function loopDays(y, m, start, end, type, tIdx, wIdx, lastDay = 31) {
        let html = "";
        for (let d = start; d <= end; d++) {
            const isInvalid = d > lastDay;
            if (type === 'date') { html += `<td class="date-num ${isInvalid?'':getDayClass(y,m,d)}">${isInvalid ? '' : d}</td>`; }
            else {
                if (isInvalid) html += `<td style="background:#111827;"></td>`;
                else {
                    const val = teamData[tIdx].workers[wIdx].days[d] || "";
                    let colorClass = "";
                    if(val) {
                        const n = parseFloat(val);
                        if(n > 2) colorClass = "g-red";
                        else if(n > 1) colorClass = "g-yellow";
                        else colorClass = "g-green";
                    }
                    html += `<td class="gongsu-cell ${colorClass}" data-t="${tIdx}" data-w="${wIdx}" data-d="${d}" onclick="handleCellClick(this)">${val}</td>`;
                }
            }
        }
        return html;
    }

    function getDayClass(y, m, d) { const day = new Date(y, m - 1, d).getDay(); return day === 0 ? 'sun' : (day === 6 ? 'sat' : ''); }
    function addTeam() { const name = prompt("팀 이름 입력"); if(name) { teamData.push({ teamName: name, workers: [] }); renderAllTeams(); } }
    function addWorker(tIdx) { teamData[tIdx].workers.push({ name: "", days: {} }); renderAllTeams(); }
    function removeWorker(tIdx, wIdx) { teamData[tIdx].workers.splice(wIdx, 1); renderAllTeams(); }
    function updateName(tIdx, wIdx, val) { teamData[tIdx].workers[wIdx].name = val; }
    
    function handleCellClick(el) {
        const { t, w, d } = el.dataset;
        const current = parseFloat(teamData[t].workers[w].days[d] || 0);
        teamData[t].workers[w].days[d] = (current === 1 ? "" : 1);
        renderAllTeams();
    }

    function bindLongPress() {
        document.querySelectorAll('.gongsu-cell').forEach(cell => {
            let timer;
            const start = () => timer = setTimeout(() => {
                const { t, w, d } = cell.dataset;
                const input = prompt(`${teamData[t].workers[w].name || '작업자'} - ${d}일 공수 직접 입력`, teamData[t].workers[w].days[d]);
                if (input !== null) { teamData[t].workers[w].days[d] = (input === "0" ? "" : input); renderAllTeams(); }
            }, 700);
            cell.onmousedown = cell.ontouchstart = start;
            cell.onmouseup = cell.ontouchend = () => clearTimeout(timer);
        });
    }

    async function saveMonthlyLog() {
        const month = document.getElementById('logMonth').value;
        const site = document.getElementById('siteName').value.trim();
        if(!site) return alert("현장명 입력!");
        try {
            const data = { teamId: myTeamId, month, site, teamData, updatedAt: Date.now(), writer: userNickname };
            if(editingId) await db.collection("logs_test").doc(editingId).set(data);
            else await db.collection("logs_test").add(data);
            alert("저장되었습니다!"); location.reload();
        } catch(e) { alert(e.message); }
    }

    function loadHistory() {
        db.collection("logs_test").where("teamId","==", myTeamId).orderBy("updatedAt","desc").limit(10).onSnapshot(ss => {
            document.getElementById('history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `<div class="history-card"><button style="position:absolute; top:15px; right:15px; background:none; border:none; color:#666; font-size:1.2rem;" onclick="deleteLog('${doc.id}')">×</button><div><span style="color:var(--primary); font-size:0.8rem; font-weight:bold;">${d.month}</span><br><b style="font-size:1.1rem; color:white;">${d.site}</b></div><div class="history-btns"><button class="btn-history btn-edit" onclick="editLog('${doc.id}')">수정하기</button><button class="btn-history btn-copy" onclick="copyLog('${doc.id}')">복사</button><button class="btn-history btn-excel-save" onclick="exportToExcel('${doc.id}')">엑셀 저장</button></div></div>`;
            }).join('') || "내역 없음";
        });
    }

    async function editLog(id) { const doc = await db.collection("logs_test").doc(id).get(); const d = doc.data(); editingId = id; document.getElementById('logMonth').value = d.month; document.getElementById('siteName').value = d.site; teamData = d.teamData; renderAllTeams(); window.scrollTo(0, 0); }
    async function copyLog(id) { const doc = await db.collection("logs_test").doc(id).get(); const d = doc.data(); editingId = null; document.getElementById('logMonth').value = d.month; document.getElementById('siteName').value = d.site + " (복사)"; teamData = d.teamData; renderAllTeams(); window.scrollTo(0, 0); }
    async function deleteLog(id) { if(confirm("삭제?")) await db.collection("logs_test").doc(id).delete(); }

    async function exportToExcel(id) {
        const doc = await db.collection("logs_test").doc(id).get();
        if(!doc.exists) return;
        const data = doc.data();
        const [year, monthNum] = data.month.split('-');
        const lastDayNum = new Date(year, monthNum, 0).getDate();

        const wb = XLSX.utils.book_new();
        // 1~5행까지 확보 (4번행 밑 공백을 위해 length 5)
        const wsData = Array.from({ length: 5 }, () => Array(36).fill(""));

        wsData[0][0] = `${year}년 ${monthNum}월 현장 작업 일보 (김목수이야기)`;
        wsData[1][0] = `현장명: ${data.site}`;
        wsData[1][12] = `기간: ${year}.${monthNum}.01 ~ ${monthNum}.${lastDayNum}`;
        wsData[1][30] = `작성자: ${data.writer || ""}`;

        const headerRow = ["NO", "공정", "이 름"];
        for(let d=1; d<=31; d++) headerRow.push(d);
        headerRow.push("계", "비고");
        wsData[3] = headerRow; // 4번 행 (헤더)
        // wsData[4]는 자동으로 공백 (5번 행)

        let curR = 5;
        let totalNo = 1;

        data.teamData.forEach(team => {
            if(team.workers.length === 0) return;
            let teamStartR = curR + 1;
            team.workers.forEach(w => {
                const row = Array(36).fill("");
                row[0] = totalNo++;
                row[1] = team.teamName;
                row[2] = w.name;
                for(let d=1; d<=31; d++) { row[d+2] = parseFloat(w.days[d] || 0) || ""; }
                row[34] = { t: 'n', f: `SUM(D${curR+1}:AH${curR+1})` };
                wsData.push(row);
                curR++;
            });
            const sumRow = Array(36).fill("");
            sumRow[1] = team.teamName;
            sumRow[2] = "공정소계";
            sumRow[34] = { t: 'n', f: `SUM(AI${teamStartR}:AI${curR})` };
            wsData.push(sumRow);
            curR += 2;
            wsData.push(Array(36).fill("")); 
        });

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!merges'] = [
            { s: { r: 0, c: 0 }, e: { r: 0, c: 35 } },
            { s: { r: 1, c: 0 }, e: { r: 1, c: 11 } },
            { s: { r: 1, c: 12 }, e: { r: 1, c: 29 } },
            { s: { r: 1, c: 30 }, e: { r: 1, c: 35 } }
        ];

        ws['!cols'] = [
            { wch: 4.5 }, { wch: 11 }, { wch: 11 },
            ...Array(31).fill({ wch: 2.2 }),
            { wch: 7 }, { wch: 10 }
        ];

        ws['!rows'] = [
            { hpt: 55 }, // 1행 제목
            { hpt: 25 }, // 2행 정보
            { hpt: 12 }, // 3행 절반 높이 (요청 사항)
            { hpt: 25 }, // 4행 헤더
            { hpt: 12 }  // 5행 절반 높이 (요청 사항 - 공백행)
        ];

        XLSX.utils.book_append_sheet(wb, ws, "근무현황");
        XLSX.writeFile(wb, `${data.site}_${monthNum}월_${data.writer}.xlsx`);
    }

    document.getElementById('logMonth').onchange = renderAllTeams;
</script>
</body>
</html>
