<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta property="og:title" content="김목수이야기 - 스마트 대시보드">
    <meta property="og:description" content="현장 관리 전문 시스템">
    <meta property="og:image" content="og-image.png">

    <title>김목수이야기 - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-deep: #020617; /* 완전한 다크 배경 */
            --sidebar-bg: #0f172a;
            --card-bg: #1e293b;
            --primary-accent: #3b82f6;
        }

        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; overflow-x: hidden; }

        /* 사이드바 고정 스타일 */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            transition: 0.3s;
        }

        /* 메인 콘텐츠 영역 (사이드바 우측) */
        .main-content {
            margin-left: 280px;
            min-height: 100vh;
            padding: 40px;
            transition: 0.3s;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 240px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; }
        }

        /* 메뉴 아이템 POP 효과 */
        .nav-link {
            color: #94a3b8;
            padding: 12px 20px;
            margin: 4px 15px;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--primary-accent);
            color: white;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .content-section { display: none; animation: fadeIn 0.4s ease-out; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dash-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .dash-card:hover { transform: translateY(-10px); border-color: var(--primary-accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

<button class="btn btn-primary d-md-none position-fixed bottom-0 end-0 m-4 rounded-circle" style="z-index: 2000; width:60px; height:60px;" onclick="document.querySelector('.sidebar').classList.toggle('active')">
    <i class="bi bi-list fs-3"></i>
</button>

<div class="sidebar d-flex flex-column">
    <div class="p-4 text-center border-bottom border-secondary border-opacity-25">
        <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 150px;">
    </div>
    
    <ul class="nav nav-pills flex-column mt-4 mb-auto">
        <li><a href="#" class="nav-link active" onclick="showSection('home', this)"><i class="bi bi-grid-fill me-2"></i> 대시보드</a></li>
        <li><a href="monthly_log.html" class="nav-link"><i class="bi bi-journal-check me-2"></i> 실전 작업일보</a></li>
        <li><a href="work_log_test.html" class="nav-link"><i class="bi bi-flask me-2"></i> test ver.</a></li>
        <li><a href="t5.html" class="nav-link"><i class="bi bi-calculator me-2"></i> T5 계산기</a></li>
        <li><a href="#" class="nav-link" onclick="alert('준비 중')"><i class="bi bi-tools me-2"></i> 공구/자재 관리</a></li>
    </ul>

    <div class="p-4 border-top border-secondary border-opacity-10">
        <div class="d-flex align-items-center">
            <i class="bi bi-person-circle fs-3 me-3 text-primary"></i>
            <div class="overflow-hidden">
                <div id="sideUserName" class="fw-bold text-truncate">사용자</div>
                <div class="small text-secondary" style="font-size: 0.75rem;">김목수이야기 Pro</div>
            </div>
            <button class="btn btn-link text-danger ms-auto p-0" onclick="handleLogout()"><i class="bi bi-box-arrow-right fs-5"></i></button>
        </div>
    </div>
</div>

<main class="main-content">
    <div id="home" class="content-section active">
        <div class="mb-5">
            <h1 class="fw-bold mb-2" id="welcomeMsg">반갑습니다!</h1>
            <p class="text-secondary fs-5">현장 상황을 한눈에 파악하고 관리하세요.</p>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4">
                <div class="dash-card h-100" onclick="location.href='monthly_log.html'">
                    <div class="text-primary mb-3"><i class="bi bi-calendar-check fs-1"></i></div>
                    <h3>작업일보</h3>
                    <p class="text-secondary m-0">공수 기입부터 엑셀 출력까지 한 번에.</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="dash-card h-100" onclick="location.href='t5.html'">
                    <div class="text-warning mb-3"><i class="bi bi-lightbulb fs-1"></i></div>
                    <h3>T5 계산기</h3>
                    <p class="text-secondary m-0">간접조명 물량 산출 및 견적 보조.</p>
                </div>
            </div>
            <div class="col-md-6 col-lg-4">
                <div class="dash-card h-100 opacity-50">
                    <div class="text-success mb-3"><i class="bi bi-house-gear fs-1"></i></div>
                    <h3>도면 뷰어</h3>
                    <p class="text-secondary m-0">업데이트 준비 중인 기능입니다.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    auth.onAuthStateChanged(async user => {
        if (user) { 
            const userDoc = await db.collection("users").doc(user.email).get();
            const nick = userDoc.exists ? userDoc.data().nickname : user.email.split('@')[0];
            document.getElementById('welcomeMsg').innerText = `${nick}님, 반갑습니다!`;
            document.getElementById('sideUserName').innerText = nick;
        } else { location.href = 'index.html'; } // 실제 서비스 시 로그인 안 되면 튕기게 설정
    });

    function showSection(id, el) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if(window.innerWidth <= 768) document.querySelector('.sidebar').classList.remove('active');
    }

    async function handleLogout() { if(confirm("로그아웃 하시겠습니까?")) { await auth.signOut(); location.reload(); } }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
