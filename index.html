    <style>
        /* 기존 스타일 아래에 이 내용을 추가하거나 수정하세요 */

.menu-item {
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; /* 모서리를 살짝 더 둥글게 */
    padding: 20px;
    cursor: pointer;
    text-align: center;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* POP 효과를 위한 튕김 애니메이션 */
}

/* 마우스 커서를 올렸을 때 (POP 효과) */
.menu-item:hover {
    transform: translateY(-8px) scale(1.05); /* 위로 8px 뜨면서 5% 확대 */
    background: #334155;
    border-color: var(--primary);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4); /* 그림자를 깊게 주어 떠 있는 느낌 강조 */
    z-index: 10;
}

/* 테스트 버전 버튼은 별도 효과 */
.menu-item.test-btn:hover {
    border-color: #fbbf24; /* 노란색 계열로 강조 */
    box-shadow: 0 15px 30px rgba(251, 191, 36, 0.2);
}

/* 메인 버튼(접속하기 등)에도 동일한 효과 적용 */
.btn-main {
    transition: all 0.3s ease;
}

.btn-main:hover {
    transform: scale(1.02);
    filter: brightness(1.1); /* 살짝 밝게 */
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
}
        /* 대시보드 및 로그인 화면 디자인 보강 */

        .menu-item { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }

<script>
    let isLoginMode = true;

    // 로그인 상태 감시
    auth.onAuthStateChanged(async user => {
        if (user) { 
            const userDoc = await db.collection("users").doc(user.email).get();
            const nick = userDoc.exists ? userDoc.data().nickname : user.email.split('@')[0];
            showDashboard(nick);
        } else { 
            document.getElementById('auth-box').style.display='block'; 
            document.getElementById('dashboard-box').style.display='none'; 
        }
    });

    // 드롭다운 메뉴 제어
    function toggleDropdown(e) { 
        e.stopPropagation(); 
        document.getElementById("myDropdown").classList.toggle("show"); 
    }
    
    window.onclick = () => { 
        const d = document.getElementById("myDropdown"); 
        if(d && d.classList.contains('show')) d.classList.remove('show'); 
    }

    // 로그인/회원가입 모드 전환
    function toggleAuthMode() { 
        isLoginMode = !isLoginMode; 
        document.getElementById('auth-title').innerText = isLoginMode ? "로그인" : "회원가입"; 
        document.getElementById('userNick').style.display = isLoginMode ? "none" : "block"; 
        document.getElementById('toggle-link').innerText = isLoginMode ? "회원가입" : "로그인으로";
    }

    // 인증 처리 (로그인 및 회원가입)
    async function handleAuth() {
        const email = document.getElementById('userEmail').value.trim();
        const pw = document.getElementById('userPw').value.trim();
        const nick = document.getElementById('userNick').value.trim();
        
        if(!email || !pw) return alert("이메일과 비밀번호를 입력해주세요.");
        
        try { 
            if(isLoginMode) { 
                await auth.signInWithEmailAndPassword(email, pw); 
            } else { 
                if(!nick) return alert("사용하실 이름을 입력해주세요.");
                await auth.createUserWithEmailAndPassword(email, pw); 
                await db.collection("users").doc(email).set({ nickname: nick, email: email, createdAt: Date.now() }); 
            } 
        } catch(e) { 
            alert(e.message); 
        }
    }

    function showDashboard(n) { 
        document.getElementById('auth-box').style.display='none'; 
        document.getElementById('dashboard-box').style.display='block'; 
        document.getElementById('displayUserName').innerText = `${n}님, 반갑습니다!`; 
    }

    async function handleLogout() { 
        if(confirm("정말 로그아웃 하시겠습니까?")) { 
            await auth.signOut(); 
            location.reload(); 
        } 
    }
</script>
