<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>김목수이야기 - 홈</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 체크박스 디자인 추가 */
        .remember-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #9ca3af;
            cursor: pointer;
        }
        .remember-wrapper input {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    
    <div id="auth-box" style="display:none;">
        <div class="logo-wrapper">
            <img src="kimmoksu_main_logo.png" alt="김목수이야기" class="main-logo">
        </div>

        <div class="card">
            <h2 id="auth-title" style="text-align: center; margin-bottom: 20px;">로그인</h2>
            <input type="email" id="userEmail" placeholder="이메일 주소">
            <input type="password" id="userPw" placeholder="비밀번호 (6자리 이상)">
            
            <label class="remember-wrapper">
                <input type="checkbox" id="rememberMe" checked>
                <span>자동 로그인 유지</span>
            </label>
            
            <button id="main-auth-btn" class="btn-main" onclick="handleAuth()">로그인하기</button>
            
            <p id="toggle-text" style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #9ca3af; cursor: pointer;" onclick="toggleAuthMode()">
                아이디가 없으신가요? <b>회원가입</b>
            </p>
        </div>
    </div>

    <div id="dashboard-box" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 id="displayUserName" style="margin:0; color:var(--primary);"></h3>
            <button onclick="handleLogout()" style="font-size:0.75rem; color:var(--danger); background:none; border:none; cursor:pointer;">로그아웃</button>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="location.href='t5.html'"><i>💡</i><span>T5 계산기</span></div>
            <div class="menu-item disabled" onclick="alert('서비스 준비중입니다.')"><i>📝</i><span>작업일보</span></div>
            <div class="menu-item disabled" onclick="alert('서비스 준비중입니다.')"><i>🎨</i><span>줄눈 계산기</span></div>
            <div class="menu-item disabled" onclick="alert('서비스 준비중입니다.')"><i>🛠️</i><span>공구 관리</span></div>
        </div>
    </div>
</div>

<script>
    let isLoginMode = true;

    // 로그인 상태 변화 감지
    auth.onAuthStateChanged((user) => {
        if (user) {
            showDashboard(user.email);
        } else {
            document.getElementById('auth-box').style.display = 'block';
            document.getElementById('dashboard-box').style.display = 'none';
        }
    });

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "로그인" : "회원가입";
        document.getElementById('main-auth-btn').innerText = isLoginMode ? "로그인하기" : "가입하기";
        document.getElementById('toggle-text').innerHTML = isLoginMode ? "아이디가 없으신가요? <b>회원가입</b>" : "이미 아이디가 있나요? <b>로그인</b>";
    }

    async function handleAuth() {
        const email = document.getElementById('userEmail').value.trim();
        const pw = document.getElementById('userPw').value.trim();
        const rememberMe = document.getElementById('rememberMe').checked;

        if(!email || !pw) return alert("이메일과 비번을 입력하세요.");

        try {
            // [핵심] 로그인 유지 방식 설정
            // 체크하면 LOCAL(브라우저 닫아도 유지), 체크 해제하면 SESSION(브라우저 닫으면 로그아웃)
            const persistence = rememberMe 
                ? firebase.auth.Auth.Persistence.LOCAL 
                : firebase.auth.Auth.Persistence.SESSION;
            
            await auth.setPersistence(persistence);

            if (isLoginMode) {
                await auth.signInWithEmailAndPassword(email, pw);
            } else {
                await auth.createUserWithEmailAndPassword(email, pw);
                alert("가입 성공!");
            }
        } catch (error) {
            alert("오류: " + error.message);
        }
    }

    function showDashboard(email) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('dashboard-box').style.display = 'block';
        document.getElementById('displayUserName').innerText = `${email.split('@')[0]}님`;
    }

    async function handleLogout() {
        if(confirm("로그아웃 하시겠습니까?")) {
            await auth.signOut();
            location.reload();
        }
    }
</script>
</body>
</html>
