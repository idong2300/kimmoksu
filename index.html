<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e222d">
    <meta property="og:title" content="김목수이야기 - All-in-One">
    <meta property="og:image" content="og-image.png">

    <title>김목수이야기 - 통합 관리 시스템</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-deep: #131722; 
            --sidebar-bg: #1e222d;
            --card-bg: #2a2e39;
            --primary-accent: #5c7cfa; 
            --danger-btn: #e03131;
            --success-btn: #0ca678;
        }

        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }

        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; position: relative; }
        
        /* 사이드바 */
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1050; overflow-y: auto; }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding-bottom: 50px; }

        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        .page-section { display: none; padding: 30px; animation: fadeIn 0.3s ease-out; max-width: 1000px; margin: 0 auto; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 모바일 대응 */
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1040; backdrop-filter: blur(2px); transition: 0.3s; opacity: 0; }
        .sidebar-overlay.active { display: block; opacity: 1; }
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); } 
            .page-section { padding: 20px 15px; } 
            .mobile-menu-btn { display: flex !important; } 
        }

        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; cursor: pointer; }

        /* 공통 카드 & 입력창 */
        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .t5-input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .t5-input-dark::placeholder { color: #8b95a1 !important; opacity: 1 !important; }
        .t5-btn-primary { background: var(--primary-accent); border: none; color: white; border-radius: 10px; padding: 14px; font-weight: bold; width: 100%; transition: 0.2s; cursor: pointer; }
        .t5-btn-small { background: rgba(255,255,255,0.1); border: none; color: #ced4da; padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; transition: 0.2s; cursor: pointer; }

        /* 작업일보 테이블 */
        .excel-table { width: 100%; border-collapse: collapse; background: var(--card-bg); margin-bottom: 10px; table-layout: fixed; border: 2px solid #4b5563; }
        .excel-table td { border: 1px solid #4b5563; text-align: center; height: 38px; font-size: 0.85rem; color: white; padding: 0; }
        .date-row td { height: 22px !important; background: #1e222d; font-size: 0.75rem; color: #94a3b8; font-weight: bold; }
        .name-cell { width: 75px; background: #181b24 !important; font-weight: bold; }
        .name-input { width: 90%; background: transparent; border: none; color: white; text-align: center; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .gongsu-cell { cursor: pointer; font-weight: bold; }
        .g-green { background: rgba(16, 185, 129, 0.2) !important; color: #10b981 !important; }
        .g-yellow { background: rgba(245, 158, 11, 0.2) !important; color: #f59e0b !important; }
        .g-red { background: rgba(239, 68, 68, 0.2) !important; color: #ef4444 !important; }

        /* T5 결과 & 히스토리 */
        #t5-temp-result { background: #1c212d; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; }
        .res-gap { color: #fcc419; font-weight: bold; font-size: 0.85rem; }
        .history-card { background: var(--card-bg); border-radius: 16px; padding: 18px; margin-bottom: 12px; position: relative; }
        .history-author { position: absolute; top: 18px; right: 18px; font-size: 0.8rem; color: #8b95a1; }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <img src="kimmoksu_main_logo.png" style="max-width: 180px; margin-bottom: 30px;">
        <h3 id="auth-title" class="mb-4 fw-bold">현장 관리 접속</h3>
        <input type="text" id="userNick" class="form-control t5-input-dark mb-3" placeholder="닉네임" style="display:none;">
        <input type="email" id="userEmail" class="form-control t5-input-dark mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control t5-input-dark mb-4" placeholder="비밀번호">
        <button class="t5-btn-primary" onclick="handleAuth()">접속하기</button>
        <p class="mt-4 text-secondary small" onclick="toggleAuthMode()" style="cursor:pointer;">계정 가입/로그인 전환</p>
    </div>
</div>

<div class="app-wrapper">
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10 mt-2">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px; cursor: pointer;" onclick="location.reload()">
        </div>
        <div class="flex-grow-1 mt-3">
            <div class="nav-link active" onclick="showPage('home', this)"><i class="bi bi-house-door"></i> 홈</div>
            <div class="nav-link" onclick="showPage('worklog', this)"><i class="bi bi-journal-check"></i> 작업일보</div>
            <div class="nav-link" onclick="showPage('t5', this)"><i class="bi bi-calculator"></i> T5 계산기</div>
        </div>
        <div class="p-4 border-top border-secondary border-opacity-10 dropup mt-auto">
            <div class="d-flex align-items-center dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
                <i class="bi bi-person-circle fs-3 me-3" style="color:var(--primary-accent);"></i>
                <div class="flex-grow-1 overflow-hidden">
                    <div id="userNickDisplay" class="fw-bold text-truncate">사용자</div>
                    <div class="small text-secondary" style="font-size:0.7rem;">Kimmoksu Pro</div>
                </div>
            </div>
            <ul class="dropdown-menu dropdown-menu-dark shadow w-100 mb-2 border-secondary">
                <li><a class="dropdown-item py-2" href="profile.html"><i class="bi bi-gear me-2"></i>내 정보 수정</a></li>
                <li><a class="dropdown-item py-2" href="team.html"><i class="bi bi-people me-2"></i>팀원 관리</a></li>
                <li><hr class="dropdown-divider border-secondary opacity-50"></li>
                <li><a class="dropdown-item py-2 text-danger" href="#" onclick="handleLogout()"><i class="bi bi-box-arrow-right me-2"></i>로그아웃</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container">
        <section id="page-home" class="page-section active">
            <h2 id="welcomeMsg" class="fw-bold mb-4">반갑습니다!</h2>
            <div class="row g-3">
                <div class="col-md-6" onclick="showPage('worklog', document.querySelectorAll('.nav-link')[1])">
                    <div class="t5-card h-100 cursor-pointer text-center py-5">
                        <i class="bi bi-pencil-square fs-1 mb-3 d-block" style="color:var(--primary-accent);"></i>
                        <h4 class="fw-bold">작업일보 작성</h4>
                        <p class="text-secondary small m-0">공수 기록 및 엑셀 변환</p>
                    </div>
                </div>
                <div class="col-md-6" onclick="showPage('t5', document.querySelectorAll('.nav-link')[2])">
                    <div class="t5-card h-100 cursor-pointer text-center py-5">
                        <i class="bi bi-lightbulb fs-1 mb-3 d-block text-warning"></i>
                        <h4 class="fw-bold">T5 계산기</h4>
                        <p class="text-secondary small m-0">물량 산출 및 팀 공유</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-worklog" class="page-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">실전 작업일보</h3>
                <button onclick="addTeam()" class="t5-btn-small">+ 공정 추가</button>
            </div>
            <div class="row g-2 mb-4">
                <div class="col-md-4"><input type="month" id="logMonth" class="form-control t5-input-dark"></div>
                <div class="col-md-8"><input type="text" id="siteName" class="form-control t5-input-dark" placeholder="현장명을 입력하세요"></div>
            </div>
            <div id="team-container"></div>
            <button class="t5-btn-primary mt-4 mb-5" onclick="saveMonthlyLog()">현장 데이터 최종 저장 💾</button>
            
            <h5 class="fw-bold mt-5 mb-3"><i class="bi bi-archive me-2"></i>최근 저장 기록</h5>
            <div id="history-list" class="row g-3"></div>
        </section>

        <section id="page-t5" class="page-section">
            <h5 class="mb-4" style="color:var(--primary-accent);"><i class="bi bi-caret-right-fill"></i> T5 계산기 (50mm 여유)</h5>
            
            <div class="t5-card mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold m-0">제품 규격 설정</h6>
                    <button class="t5-btn-small rounded-circle px-2" onclick="toggleT5Specs()"><i class="bi bi-gear"></i></button>
                </div>
                <div id="t5-spec-container" style="display:none;" class="mt-3 pt-3 border-top border-secondary border-opacity-25">
                    <div class="row g-2" id="t5-spec-list">
                        <div class="col-4 col-md-auto spec-item"><label class="small text-secondary mb-1">1200용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="1200" value="1190"></div>
                        <div class="col-4 col-md-auto spec-item"><label class="small text-secondary mb-1">900용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="900" value="890"></div>
                        <div class="col-4 col-md-auto spec-item"><label class="small text-secondary mb-1">600용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="600" value="590"></div>
                        <div class="col-4 col-md-auto spec-item"><label class="small text-secondary mb-1">400용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="400" value="385"></div>
                        <div class="col-4 col-md-auto spec-item"><label class="small text-secondary mb-1">300용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="300" value="300"></div>
                    </div>
                    <div class="mt-2 text-end"><button class="t5-btn-small" onclick="addNewSpec()">+ 신규 추가</button></div>
                </div>
            </div>

            <div class="t5-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold m-0">실측 길이 입력 (mm)</h6>
                    <button class="t5-btn-small" onclick="addT5Row()">+ 구간 추가</button>
                </div>
                <input type="text" id="t5-site-title" class="form-control t5-input-dark mb-3" placeholder="현장/부위 명칭 (예: 일강이앤아이)">
                <div id="t5-input-container">
                    <div class="row g-2 mb-2 t5-row-item">
                        <div class="col-6"><input type="text" class="form-control t5-input-dark t5-section-name" placeholder="구간 (예: 거실)"></div>
                        <div class="col-6"><input type="number" class="form-control t5-input-dark t5-length-val" placeholder="길이 (mm)"></div>
                    </div>
                </div>
                <button class="t5-btn-primary mt-3" onclick="calculateT5Only()">1. 계산하기</button>
            </div>

            <div id="t5-temp-result">
                <h6 class="fw-bold text-white mb-3" id="res-site-display">📍 현장 결과</h6>
                <div id="res-list-container"></div>
                <div class="mt-3 pt-3 border-top border-secondary border-opacity-25">
                    <div class="d-flex justify-content-between"><span class="text-secondary small">총 발주 물량</span><b id="res-total-summary"></b></div>
                </div>
            </div>
            <button id="t5-save-btn" class="t5-btn-primary mb-5" style="background:var(--success-btn); display:none;" onclick="saveT5ToHistory()">2. 팀 히스토리에 저장 </button>

            <h6 class="fw-bold mt-4 mb-3"><i class="bi bi-card-text me-2"></i>팀 공유 히스토리</h6>
            <div id="t5-history-list"></div>
        </section>
    </main>

    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
</div>

<script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    let myEmail, myTeamId, editingId = null, userNickname = "관리자", calculatedData = null;
    let isLoginMode = true;
    
    let teamData = [
        { teamName: "목공팀", workers: [] }, { teamName: "도장팀", workers: [] },
        { teamName: "전기팀", workers: [] }, { teamName: "필름팀", workers: [] }
    ];

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
    function showPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
        if (window.innerWidth <= 768) toggleSidebar();
    }

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get();
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            document.getElementById('userNickDisplay').innerText = userNickname;
            document.getElementById('welcomeMsg').innerText = `${userNickname}님, 반갑습니다!`;
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { myTeamId = q.docs[0].id; loadHistory(); loadT5History(); renderAllTeams(); }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    /* --- [작업일보 로직] --- */
    function renderAllTeams() {
        const container = document.getElementById('team-container');
        const monthVal = document.getElementById('logMonth').value || "2026-04";
        const [year, month] = monthVal.split('-').map(Number);
        const lastDay = new Date(year, month, 0).getDate();
        
        container.innerHTML = teamData.map((team, tIdx) => {
            let teamTotal = 0;
            const tables = team.workers.map((w, wIdx) => {
                let pSum = 0; Object.values(w.days).forEach(v => pSum += parseFloat(v || 0)); teamTotal += pSum;
                return `<table class="excel-table"><tr class="date-row"><td rowspan="4" class="name-cell">
                    <input type="text" class="name-input" value="${w.name}" onchange="updateWorkerName(${tIdx}, ${wIdx}, this.value)" placeholder="이름입력"><br>
                    <button onclick="removeWorker(${tIdx}, ${wIdx})" class="btn btn-danger btn-sm p-0 px-2 mt-2" style="font-size:0.6rem;">삭제</button>
                    </td>${loopDays(year, month, 1, 16, 'date')}</tr><tr>${loopDays(year, month, 1, 16, 'input', tIdx, wIdx)}</tr><tr class="date-row">${loopDays(year, month, 17, 31, 'date', 0, 0, lastDay)}<td style="background:#1e222d;">계</td></tr><tr>${loopDays(year, month, 17, 31, 'input', tIdx, wIdx, lastDay)}<td class="fw-bold" style="color:var(--primary-accent);">${pSum % 1 === 0 ? pSum : pSum.toFixed(1)}</td></tr></table>`;
            }).join('');
            return `<div class="mb-5"><div class="d-flex justify-content-between align-items-center mb-2"><h6 class="m-0 fw-bold">${team.teamName}</h6><button onclick="addWorker(${tIdx})" class="t5-btn-small px-3">+</button></div>${tables}<div class="text-end small text-secondary">공정 소계: <b>${teamTotal.toFixed(1)}</b></div></div>`;
        }).join('');
        bindLongPress();
    }
    
    function loopDays(y, m, start, end, type, tIdx, wIdx, lastDay = 31) { 
        let html = ""; 
        for (let d = start; d <= end; d++) { 
            const isInvalid = d > lastDay; 
            if (type === 'date') {
                if (isInvalid) html += `<td></td>`;
                else {
                    const dateObj = new Date(y, m - 1, d);
                    const dayOfWeek = dateObj.getDay();
                    let color = "";
                    if (dayOfWeek === 0) color = "color: #ef4444;"; // 일요일
                    else if (dayOfWeek === 6) color = "color: #5c7cfa;"; // 토요일
                    html += `<td style="${color}">${d}</td>`;
                }
            } else { 
                if (isInvalid) html += `<td style="background:#131722;"></td>`; 
                else { 
                    const val = teamData[tIdx].workers[wIdx].days[d] || ""; 
                    let c = ""; if(val) { const n=parseFloat(val); c = n>2?"g-red":n>1?"g-yellow":"g-green"; } 
                    html += `<td class="gongsu-cell ${c}" data-t="${tIdx}" data-w="${wIdx}" data-d="${d}" onclick="handleCellClick(this)">${val}</td>`; 
                } 
            } 
        } 
        return html; 
    }

    function handleCellClick(el) { const { t, w, d } = el.dataset; teamData[t].workers[w].days[d] = (teamData[t].workers[w].days[d] == 1 ? "" : 1); renderAllTeams(); }
    function bindLongPress() { document.querySelectorAll('.gongsu-cell').forEach(cell => { let timer; cell.onmousedown = cell.ontouchstart = () => timer = setTimeout(() => { const { t, w, d } = cell.dataset; const input = prompt(`${teamData[t].workers[w].name || '작업자'} - ${d}일 공수`, teamData[t].workers[w].days[d]); if (input !== null) { teamData[t].workers[w].days[d] = input; renderAllTeams(); } }, 700); cell.onmouseup = cell.ontouchend = () => clearTimeout(timer); }); }
    function addTeam() { const n = prompt("공정명"); if(n) { teamData.push({teamName:n, workers:[]}); renderAllTeams(); } }
    function addWorker(tIdx) { teamData[tIdx].workers.push({name:"", days:{}}); renderAllTeams(); }
    function updateWorkerName(tIdx, wIdx, val) { teamData[tIdx].workers[wIdx].name = val; }
    function removeWorker(tIdx, wIdx) { if(confirm("삭제?")) { teamData[tIdx].workers.splice(wIdx, 1); renderAllTeams(); } }
    async function saveMonthlyLog() { const month = document.getElementById('logMonth').value, site = document.getElementById('siteName').value.trim(); if(!site) return alert("현장명 필수!"); const data = { teamId: myTeamId, month, site, teamData, updatedAt: Date.now(), writer: userNickname }; if(editingId) await db.collection("monthly_logs").doc(editingId).set(data); else await db.collection("monthly_logs").add(data); alert("저장 완료"); location.reload(); }
    function loadHistory() { db.collection("monthly_logs").where("teamId","==", myTeamId).orderBy("updatedAt","desc").limit(10).onSnapshot(ss => { document.getElementById('history-list').innerHTML = ss.docs.map(doc => { const d = doc.data(); return `
        <div class="col-md-6"><div class="t5-card p-3 d-flex justify-content-between align-items-center m-0">
                <div><small style="color:var(--primary-accent);">${d.month}</small><br><b class="fs-6">${d.site}</b></div>
                <div class="d-flex gap-1">
                    <button class="t5-btn-small bg-secondary text-white" onclick="editLog('${doc.id}')">수정</button>
                    <button class="t5-btn-small" style="background:var(--primary-accent); color:white;" onclick="copyLog('${doc.id}')">복사</button>
                    <button class="t5-btn-small bg-success text-white" onclick="exportToExcel('${doc.id}')">엑셀</button>
                </div></div></div>`; }).join('') || '<p class="text-secondary small ms-2">기록 없음</p>'; }); 
    }
    async function editLog(id) { const doc = await db.collection("monthly_logs").doc(id).get(); const d = doc.data(); editingId = id; document.getElementById('logMonth').value = d.month; document.getElementById('siteName').value = d.site; teamData = d.teamData; showPage('worklog', document.querySelectorAll('.nav-link')[1]); renderAllTeams(); }
    async function copyLog(id) { const doc = await db.collection("monthly_logs").doc(id).get(); const d = doc.data(); editingId = null; document.getElementById('logMonth').value = d.month; document.getElementById('siteName').value = d.site + " (복사)"; teamData = d.teamData; showPage('worklog', document.querySelectorAll('.nav-link')[1]); renderAllTeams(); alert("복사되었습니다."); }

    /* --- [T5 계산기 로직] --- */
    function toggleT5Specs() { const el = document.getElementById('t5-spec-container'); el.style.display = el.style.display === 'none' ? 'block' : 'none'; }
    function addNewSpec() { let n = prompt("규격 명칭(예: 1500)"); if(!n) return; let a = prompt(n+"용 실제 치수(mm)"); if(!a) return; let div = document.createElement('div'); div.className = "col-4 col-md-auto spec-item position-relative"; div.innerHTML = `<label class="small text-secondary mb-1">${n}용</label><input type="number" class="form-control t5-input-dark text-center p-1 fs-6 spec-actual" data-nominal="${n}" value="${a}"><button class="btn btn-sm btn-danger position-absolute top-0 end-0 p-0" style="width:20px;height:20px;font-size:10px;" onclick="this.parentElement.remove()">X</button>`; document.getElementById('t5-spec-list').appendChild(div); }
    function addT5Row() { const div = document.createElement('div'); div.className = "row g-2 mb-2 t5-row-item"; div.innerHTML = `<div class="col-6"><input type="text" class="form-control t5-input-dark t5-section-name" placeholder="구간"></div><div class="col-6"><input type="number" class="form-control t5-input-dark t5-length-val" placeholder="길이"></div>`; document.getElementById('t5-input-container').appendChild(div); }

    function calculateT5Only() {
        const site = document.getElementById('t5-site-title').value.trim() || "미지정 현장";
        const rows = document.querySelectorAll('.t5-row-item');
        let specEls = document.querySelectorAll('.spec-actual');
        let specs = []; specEls.forEach(el => specs.push({ n: el.getAttribute('data-nominal'), a: parseInt(el.value) || 0 }));
        specs.sort((a,b) => b.a - a.a);
        
        let sectionRes = [], totalCounts = {}, rowsData = [];
        rows.forEach(row => {
            const name = row.querySelector('.t5-section-name').value || "구간";
            const len = parseInt(row.querySelector('.t5-length-val').value) || 0;
            if(len <= 0) return;
            rowsData.push({ section: name, length: len });
            let remain = len - 50, lineArr = [], sumA = 0;
            specs.forEach(s => { let q = Math.floor(remain / s.a); if(q>0) { lineArr.push(`${s.n}-${q}개`); totalCounts[s.n] = (totalCounts[s.n]||0)+q; remain -= (q*s.a); sumA += (q*s.a); } });
            sectionRes.push({ name, result: lineArr.join(', '), gap: len - sumA });
        });

        if(sectionRes.length === 0) return alert("길이 입력 필요");
        let totalSum = []; Object.keys(totalCounts).sort((a,b)=>b-a).forEach(k => totalSum.push(`${k}-${totalCounts[k]}개`));
        const finalRes = totalSum.join(' / ');
        calculatedData = { siteName: site, rows: rowsData, resultText: finalRes };

        document.getElementById('res-site-display').innerText = `📍 ${site}`;
        document.getElementById('res-list-container').innerHTML = sectionRes.map(r => `<div class="mb-2"><div class="small text-secondary border-bottom border-secondary border-opacity-25 pb-1">• ${r.name}: ${r.result}</div><div class="res-gap ms-2">ㄴ 여유: ${r.gap}mm (50mm 이상 확보)</div></div>`).join('');
        document.getElementById('res-total-summary').innerText = finalRes;
        document.getElementById('t5-temp-result').style.display = 'block';
        document.getElementById('t5-save-btn').style.display = 'block';
    }

    async function saveT5ToHistory() {
        if(!calculatedData) return;
        const data = { teamId: myTeamId, siteName: calculatedData.siteName, resultText: calculatedData.resultText, rows: calculatedData.rows, writer: userNickname, createdAt: Date.now() };
        await db.collection("t5_logs").add(data);
        alert("저장 완료!"); location.reload();
    }

    function loadT5History() {
        db.collection("t5_logs").where("teamId","==", myTeamId).orderBy("createdAt","desc").limit(20).onSnapshot(ss => {
            document.getElementById('t5-history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `<div class="history-card"><div class="history-author"><i class="bi bi-person-fill"></i> ${d.writer}</div><h6 class="fw-bold text-white mb-2">${d.siteName}</h6><p class="text-secondary small mb-3">${d.resultText}</p><div class="d-flex gap-2">
                    <button class="t5-btn-small bg-primary text-white" style="flex:1;" onclick="loadT5Log('${doc.id}')">불러오기</button>
                    <button class="t5-btn-small" style="flex:1; background:var(--success-btn); color:white;" onclick="copyT5Order('${d.siteName}', '${d.resultText}')">발주 복사</button>
                    <button class="t5-btn-small bg-danger text-white" style="flex:1;" onclick="deleteT5Log('${doc.id}')">삭제</button></div></div>`;
            }).join('') || '<p class="text-secondary small ms-2">내역 없음</p>';
        });
    }

    async function loadT5Log(id) {
        const doc = await db.collection("t5_logs").doc(id).get(); const d = doc.data();
        document.getElementById('t5-site-title').value = d.siteName;
        const container = document.getElementById('t5-input-container'); container.innerHTML = '';
        d.rows.forEach(r => { let div = document.createElement('div'); div.className = "row g-2 mb-2 t5-row-item"; div.innerHTML = `<div class="col-6"><input type="text" class="form-control t5-input-dark t5-section-name" value="${r.section}"></div><div class="col-6"><input type="number" class="form-control t5-input-dark t5-length-val" value="${r.length}"></div>`; container.appendChild(div); });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyT5Order(site, text) {
        const fmt = site + '\n' + text.split(' / ').join('\n');
        const t = document.createElement("textarea"); document.body.appendChild(t); t.value = fmt; t.select(); document.execCommand('copy'); document.body.removeChild(t);
        alert("카톡용 발주내용 복사 완료!\n\n" + fmt);
    }
    async function deleteT5Log(id) { if(confirm("삭제?")) await db.collection("t5_logs").doc(id).delete(); }

    /* --- [인증 & 엑셀 (기존)] --- */
    function toggleAuthMode() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "현장 관리 접속" : "회원가입 시작"; document.getElementById('userNick').style.display = isLoginMode ? "none" : "block"; }
    async function handleAuth() { const e = document.getElementById('userEmail').value.trim(), p = document.getElementById('userPw').value.trim(), n = document.getElementById('userNick').value.trim(); try { if(isLoginMode) await auth.signInWithEmailAndPassword(e, p); else { await auth.createUserWithEmailAndPassword(e, p); await db.collection("users").doc(e).set({ nickname: n, email:e, createdAt: Date.now() }); } } catch(err) { alert(err.message); } }
    async function handleLogout() { if(confirm("로그아웃?")) { await auth.signOut(); location.reload(); } }
    async function exportToExcel(id) { const doc = await db.collection("monthly_logs").doc(id).get(); const d_raw = doc.data(); const [year, monthNum] = d_raw.month.split('-'); const lastDayNum = new Date(year, monthNum, 0).getDate(); const wb = XLSX.utils.book_new(); const wsData = Array.from({ length: 5 }, () => Array(36).fill("")); wsData[0][0] = `${year}년 ${monthNum}월 현장 작업 일보 (김목수이야기)`; wsData[1][0] = `현장명: ${d_raw.site}`; wsData[3] = ["NO", "공정", "이 름", ...Array.from({length:31},(_,i)=>i+1), "계", "비고"]; let curR = 5, totalNo = 1; d_raw.teamData.forEach(team => { let startR = curR + 1; team.workers.forEach(w => { const row = [totalNo++, team.teamName, w.name, ...Array.from({length:31},(_,i)=>parseFloat(w.days[i+1]||0)|| ""), {t:'n', f:`SUM(D${curR+1}:AH${curR+1})`}]; wsData.push(row); curR++; }); wsData.push(["", team.teamName, "공정소계", ...Array(31).fill(""), {t:'n', f:`SUM(AI${startR}:AI${curR})`}]); curR += 2; }); const ws = XLSX.utils.aoa_to_sheet(wsData); XLSX.utils.book_append_sheet(wb, ws, "근무현황"); XLSX.writeFile(wb, `${d_raw.site}_${monthNum}월.xlsx`); }
    
    document.getElementById('logMonth').onchange = renderAllTeams; 
    document.getElementById('logMonth').value = new Date().toISOString().substring(0, 7);
</script>
