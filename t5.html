<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T5 계산기 - 김목수이야기</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 접기 버튼을 위한 추가 스타일 */
        .btn-toggle { background: var(--secondary); color: white; width: 24px; height: 24px; border-radius: 50%; padding: 0; font-size: 1rem; line-height: 24px; border: none; cursor: pointer; }
        #spec-section { display: none; margin-top: 10px; padding: 10px; background: #f8fafc; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <button class="btn-home" onclick="location.href='index.html'">⬅ 홈으로</button>
    <h3>💡 T5 발주 계산기</h3>
    
    <div class="card">
        <div class="section-title">
            제품 규격 설정 
            <button id="specToggleBtn" class="btn-toggle" onclick="toggleSpecSection()">+</button>
        </div>
        <div id="spec-section">
            <div id="spec-list"></div>
            <button onclick="addSpecRow()" style="width:100%; padding:5px; background:#eee; font-size:0.8rem;">+ 규격 추가</button>
        </div>
    </div>

    <div class="card">
        <div class="section-title">실측 길이 입력 (mm) <button onclick="addAreaRow()" style="font-size:0.7rem; background:#eee; padding:2px 8px;">+ 추가</button></div>
        <input type="text" id="siteName" placeholder="현장/부위 명칭">
        <div id="area-list"></div>
        <button class="btn-main" onclick="runT5Calc()">1. 계산하기</button>
    </div>

    <div id="t5-result-area" style="display:none;" class="card"></div>
    <button class="btn-main" id="t5-save-btn" style="display:none; background:var(--success); margin-bottom:20px;" onclick="saveT5ToCloud()">2. 저장하기</button>
    
    <div class="section-title">📋 최근 공유 히스토리</div>
    <div id="t5-history-list"></div>
</div>

<script>
    const currentTeam = authCheck(); // 로그인 체크
    let editingT5Id = null;
    let lastT5Data = null;

    // [추가] 제품 규격 섹션 접기/펴기 함수
    function toggleSpecSection() {
        const sec = document.getElementById('spec-section');
        const btn = document.getElementById('specToggleBtn');
        const isOpen = sec.style.display === 'block';
        sec.style.display = isOpen ? 'none' : 'block';
        btn.innerText = isOpen ? '+' : '-';
    }

    function addSpecRow(n='', s='') {
        const div = document.createElement('div'); div.className = 'spec-row';
        div.innerHTML = `<input type="text" class="input-name" value="${n}"><input type="number" class="input-val" value="${s}"><button onclick="this.parentElement.remove()" style="color:red; background:none; border:none;">X</button>`;
        document.getElementById('spec-list').appendChild(div);
    }

    function addAreaRow(n='', v='') {
        const div = document.createElement('div'); div.className = 'area-row';
        div.innerHTML = `<input type="text" class="input-name" placeholder="구간" value="${n}"> <input type="number" class="input-val" placeholder="길이" value="${v}">`;
        document.getElementById('area-list').appendChild(div);
    }

    function loadDefaultSpecs() {
        const d = [{"n":"1200","s":1190},{"n":"900","s":890},{"n":"600","s":590},{"n":"400","s":385},{"n":"300","s":330}];
        document.getElementById('spec-list').innerHTML = '';
        d.forEach(x => addSpecRow(x.n, x.s));
    }

    function runT5Calc() {
        const site = document.getElementById('siteName').value || "현장";
        const specs = Array.from(document.querySelectorAll('#spec-list .spec-row')).map(r => ({
            name: r.querySelectorAll('input')[0].value,
            size: parseFloat(r.querySelectorAll('input')[1].value)
        })).filter(x => x.size > 0).sort((a,b) => b.size - a.size);
        const areas = Array.from(document.querySelectorAll('#area-list .area-row')).map(r => ({
            name: r.querySelectorAll('input')[0].value || "구간",
            len: parseFloat(r.querySelectorAll('input')[1].value)
        })).filter(x => x.len > 0);

        if(areas.length === 0) return alert("실측 길이를 넣으세요.");
        let grandTotal = {}, html = `<strong>📍 ${site}</strong><hr>`;
        areas.forEach(a => {
            let temp = a.len - 50, counts = [];
            specs.forEach(s => {
                let c = Math.floor(temp / s.size);
                if(c > 0) { counts.push(`${s.name}-${c}개`); grandTotal[s.name] = (grandTotal[s.name] || 0) + c; temp -= s.size * c; }
            });
            html += `• ${a.name}: ${counts.join(', ') || '없음'} (남음:${temp.toFixed(0)}mm)<br>`;
        });
        lastT5Data = { site, specs, areas, grandTotal, teamId: currentTeam, createdAt: Date.now() };
        document.getElementById('t5-result-area').innerHTML = html + `<br><strong>합계: ${Object.entries(grandTotal).map(([k,v])=>`${k}-${v}개`).join('/')}</strong>`;
        document.getElementById('t5-result-area').style.display = 'block';
        const saveBtn = document.getElementById('t5-save-btn');
        saveBtn.style.display = 'block';
        saveBtn.innerText = editingT5Id ? "2. 수정 내용 덮어쓰기 💾" : "2. 우리 팀 히스토리에 저장 🌐";
    }

    async function saveT5ToCloud() {
        if(editingT5Id) {
            await db.collection("t5_history").doc(editingT5Id).update(lastT5Data);
            alert("덮어씌우기 완료");
        } else {
            await db.collection("t5_history").add(lastT5Data);
            alert("저장 완료");
        }
        location.reload();
    }

    function listenT5History() {
        db.collection("t5_history").where("teamId","==",currentTeam).orderBy("createdAt","desc").limit(15).onSnapshot(ss => {
            document.getElementById('t5-history-list').innerHTML = ss.docs.map(doc => {
                const d = doc.data();
                return `<div class="history-item">
                    <strong>${d.site}</strong><br>${Object.entries(d.grandTotal).map(([k,v])=>`${k}-${v}개`).join(', ')}
                    <div class="history-btns">
                        <button class="btn-edit" onclick="loadT5ToEdit('${doc.id}')">수정</button>
                        <button class="btn-del" onclick="deleteT5('${doc.id}')">삭제</button>
                    </div>
                </div>`;
            }).join('') || "내역 없음";
        });
    }

    async function loadT5ToEdit(id) {
        const doc = await db.collection("t5_history").doc(id).get();
        const d = doc.data();
        editingT5Id = id;
        document.getElementById('siteName').value = d.site;
        document.getElementById('spec-list').innerHTML = '';
        d.specs.forEach(s => addSpecRow(s.name, s.size));
        document.getElementById('area-list').innerHTML = '';
        d.areas.forEach(a => addAreaRow(a.name, a.len));
        // 수정 시에는 규격 칸을 자동으로 열어줌
        document.getElementById('spec-section').style.display = 'block';
        document.getElementById('specToggleBtn').innerText = '-';
        window.scrollTo(0,0);
    }

    async function deleteT5(id) { if(confirm("삭제할까요?")) await db.collection("t5_history").doc(id).delete(); }

    loadDefaultSpecs();
    addAreaRow();
    listenT5History();
</script>
</body>
</html>
