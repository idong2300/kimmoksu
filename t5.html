// t5.html의 <script> 부분 중 변경된 핵심 로직
let currentNickname = "";

auth.onAuthStateChanged(async (user) => {
    if (user) { 
        currentUserEmail = user.email; 
        // 내 닉네임 가져오기
        const userDoc = await db.collection("users").doc(user.email).get();
        currentNickname = userDoc.exists ? userDoc.data().nickname : user.email.split('@')[0];
        await findMyTeam(); 
    } else { location.href = 'index.html'; }
});

function runT5Calc() {
    // ... 기존 계산 로직 ...
    lastT5Data = { 
        site, specs, areas, grandTotal, 
        userEmail: currentUserEmail, 
        userName: currentNickname, // 👈 이메일 대신 닉네임 저장!
        teamId: myTeamId,
        createdAt: Date.now() 
    };
    // ... 결과 표시 로직 ...
}

function listenT5History() {
    db.collection("t5_history").where("teamId","==", myTeamId).orderBy("createdAt","desc").limit(20).onSnapshot(ss => {
        document.getElementById('t5-history-list').innerHTML = ss.docs.map(doc => {
            const d = doc.data();
            // 작성자 이름 표시 (닉네임이 있으면 닉네임으로)
            const displayAuthor = d.userName || d.userEmail.split('@')[0];
            return `<div class="history-item">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${d.site}</strong>
                    <span style="font-size:0.75rem; color:var(--primary);">👤 ${displayAuthor}</span>
                </div>
                </div>`;
        }).join('');
    });
}
