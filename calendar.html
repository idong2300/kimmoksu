<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="김목수이야기 - 마스터 스케줄러">
    <meta property="og:description" content="전체 현장 일정을 한눈에 확인하세요.">
    <meta property="og:image" content="https://idong2300.github.io/kimmoksu/og-image.png">
    <meta property="og:locale" content="ko_KR">

    <title>김목수이야기 - 통합 스케줄러 (V27)</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root { --bg-deep: #131722; --sidebar-bg: #1e222d; --card-bg: #2a2e39; --primary-accent: #5c7cfa; }
        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        
        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; }
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; z-index: 1050; flex-shrink: 0; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding: 30px; transition: background-color 0.3s; }
        
        .content-width { max-width: 1400px; margin: 0 auto; width: 100%; }
        
        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 0.95rem !important; }

        .cal-border-wrap { border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden; }
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; background: #1e222d; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; font-size: 0.9rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); background: rgba(255,255,255,0.1); gap: 1px; } 
        .cal-day { background: #1e222d; min-height: 140px; padding: 6px 0; cursor: pointer; transition: 0.2s; position: relative; display: flex; flex-direction: column; gap: 2px; }
        .cal-day:hover, .cal-day.selected { background: rgba(92, 124, 250, 0.1); }
        .cal-date-num { font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; padding-left: 8px; }
        
        .event-badge { font-size: 0.75rem; padding: 3px 6px; color: white; white-space: nowrap; overflow: hidden; text-overflow: clip; text-align: left; line-height: 1.2; margin-bottom: 1px; height: 24px; width: 100%; border-radius: 0; display: flex; align-items: center; }
        .event-start { border-top-left-radius: 4px; border-bottom-left-radius: 4px; margin-left: 4px; width: calc(100% - 4px); }
        .event-end { border-top-right-radius: 4px; border-bottom-right-radius: 4px; margin-right: 4px; width: calc(100% - 4px); }
        .event-single { border-radius: 4px; margin: 0 4px; width: calc(100% - 8px); }
        
        .cal-inline-check { margin-right: 5px; cursor: pointer; transform: scale(1.1); flex-shrink: 0; }
        .more-btn { font-size: 0.7rem; color: var(--primary-accent); text-align: left; padding-left: 8px; font-weight: bold; cursor: pointer; margin-top: 2px; }
        .more-btn:hover { text-decoration: underline; }

        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .list-item { background: #1e222d; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 15px; transition: 0.2s; }
        .list-item.done { opacity: 0.5; filter: grayscale(0.8); }
        .list-item.done .item-content { text-decoration: line-through; color: #adb5bd !important; }
        .color-bar { width: 4px; border-radius: 4px; align-self: stretch; flex-shrink: 0; }
        .custom-check { width: 22px; height: 22px; cursor: pointer; border-radius: 6px; border: 2px solid var(--primary-accent); appearance: none; position: relative; margin-top: 2px; }
        .custom-check:checked { background-color: var(--primary-accent); }
        .custom-check:checked::after { content: '✔'; position: absolute; color: white; font-size: 12px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .modal-box { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-backdrop-custom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }

        body.light-mode { background-color: #f4f6f8; color: #212529; }
        body.light-mode .main-container { background-color: #f4f6f8; }
        body.light-mode .sidebar { background-color: #ffffff; border-right: 1px solid #dee2e6; }
        body.light-mode .t5-card, body.light-mode .modal-box, body.light-mode .list-item { background-color: #ffffff !important; border: 1px solid #dee2e6 !important; color: #212529; }
        body.light-mode .input-dark, body.light-mode select.input-dark, body.light-mode input[type="color"] { background-color: #f8f9fa !important; border: 1px solid #ced4da !important; color: #212529 !important; }
        body.light-mode .text-white { color: #212529 !important; }
        body.light-mode .cal-header { background: #f8f9fa; border-color: #dee2e6; color: #495057; }
        body.light-mode .cal-grid { background: #dee2e6; }
        body.light-mode .cal-day { background: #ffffff; }
        body.light-mode .cal-day:hover, body.light-mode .cal-day.selected { background: #eef2ff; }
        body.light-mode .bg-dark { background-color: #e9ecef !important; }
        body.light-mode .nav-link { color: #495057; }
        body.light-mode .nav-link:hover, body.light-mode .nav-link.active { background-color: #eef2ff; color: var(--primary-accent); }
        body.light-mode img[src*="logo"] { filter: invert(1) grayscale(100%) contrast(200%); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-container { padding: 15px; }
            .cal-day { min-height: 100px; }
            .mobile-menu-btn { display: flex !important; }
        }
        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; cursor: pointer; }
    </style>
</head>
<body>

    <main class="main-container">

                <h3 class="fw-bold m-0"><i class="bi bi-calendar-check me-2" style="color:var(--primary-accent);"></i>마스터 스케줄러</h3>

            <div class="filter-scroll mb-3" id="filterContainer">

                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="gantt" onclick="toggleFilter('gantt')"><span id="dot-gantt">●</span> 공정표</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="status" onclick="toggleFilter('status')"><span id="dot-status">●</span> 상황판</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="leave" onclick="toggleFilter('leave')"><span id="dot-leave">●</span> 연차</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="construct" onclick="toggleFilter('construct')"><span id="dot-construct">●</span> 공사</button>

                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="meeting" onclick="toggleFilter('meeting')"><span id="dot-meeting">●</span> 미팅</button>
                <button class="btn btn-sm btn-outline-secondary text-white rounded-pill px-3 filter-btn" data-type="memo" onclick="toggleFilter('memo')"><span id="dot-memo">●</span> 메모</button>
            </div>

            <div class="t5-card p-0 cal-border-wrap" id="captureArea">

                <div class="cal-header">

            <div class="col-6" id="date2Container" style="display:none;">

            </div>

<div class="modal-backdrop-custom" id="colorModal">
    <div class="modal-box">
        <h5 class="fw-bold mb-4 text-white">달력 태그 색상 편집</h5>
        <p class="small text-secondary mb-3">설정한 색상은 팀원 모두에게 적용됩니다.</p>
        <div class="row g-2 mb-4" id="colorInputContainer"></div>

            <button class="btn btn-secondary w-50 py-2 fw-bold" onclick="document.getElementById('colorModal').style.display='none'">취소</button>
            <button class="btn btn-primary w-50 py-2 fw-bold" onclick="saveThemeColors()">저장하기</button>
        </div>
    </div>

<script>
    let myEmail, myTeamId, userNickname = "관리자", myRole = "member";
    let currentDate = new Date();
    let selectedDateStr = null;
    let globalEmailToNick = {};
    let allEvents = []; 
    let eventStorage = { gantt:[], status:[], leave:[], custom:[] };
    
    let activeFilters = new Set(['all']);
    let defaultColors = { gantt:'#0d6efd', status:'#20c997', leave:'#dc3545', construct:'#6f42c1', measure:'#fd7e14', meeting:'#198754', memo:'#6c757d' };
    let themeColors = { ...defaultColors };
    let colorNames = { gantt:'공정표', status:'상황판', leave:'연차', construct:'공사일정', measure:'실측', meeting:'미팅', memo:'메모' };

    document.addEventListener("DOMContentLoaded", () => {
        let td = new Date();
        currentDate = new Date(td.getFullYear(), td.getMonth(), 1);
        
        let savedTheme = localStorage.getItem('kimmoksu_theme');
        if(savedTheme === 'light') { document.body.classList.add('light-mode'); updateThemeUI(true); } 
        else { updateThemeUI(false); }
    });

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; 
            document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get(); 
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            document.getElementById('userNickDisplay').innerText = userNickname;
            
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { 
                const tDoc = q.docs[0]; myTeamId = tDoc.id; const tData = tDoc.data();
                
                if(tData.owner === myEmail || myEmail === "idong2300@naver.com") myRole = "owner";
                else if(tData.admins && tData.admins.includes(myEmail)) myRole = "admin";
                else myRole = "member";
                
                if(myRole === 'owner' || myRole === 'admin') document.getElementById('btnColorEdit').style.display = 'inline-block';
                
                if(tData.themeColors) themeColors = { ...defaultColors, ...tData.themeColors };
                applyDotColors();

                const members = tData.members || [];
                await Promise.all(members.map(async m => {
                    try { const u = await db.collection("users").doc(m).get(); globalEmailToNick[m] = u.exists ? u.data().nickname : m.split('@')[0]; }
                    catch(e) { globalEmailToNick[m] = m.split('@')[0]; }
                }));
                fetchAllData();
            }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    function toggleTheme() {
        let isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('kimmoksu_theme', isLight ? 'light' : 'dark');
        updateThemeUI(isLight);
    }
    
    function updateThemeUI(isLight) {
        const btn = document.getElementById('themeToggleBtn');
        if(isLight) { btn.innerHTML = '<i class="bi bi-moon-fill"></i> <span>블랙 모드로 전환</span>'; btn.classList.replace('btn-outline-secondary', 'btn-outline-dark'); } 
        else { btn.innerHTML = '<i class="bi bi-brightness-high-fill"></i> <span>화이트 모드로 전환</span>'; btn.classList.replace('btn-outline-dark', 'btn-outline-secondary'); }
    }

    function parseDateObj(str) {
        if (!str) return null;
        let s = str.replace(/[^0-9]/g, '');
        if (s.length === 8) return `${s.substring(0,4)}-${s.substring(4,6)}-${s.substring(6,8)}`;
        if (s.length === 6) return `20${s.substring(0,2)}-${s.substring(2,4)}-${s.substring(4,6)}`;
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        return null;
    }

    function fetchAllData() {
        db.collection("gantt_logs").where("teamId","==",myTeamId).onSnapshot(ss => {
            let gantts = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                if(d.dates && d.dates.length > 0) {
                    gantts.push({ id: doc.id, type: 'gantt', title: d.site, start: d.dates[0].split('T')[0], end: d.dates[d.dates.length-1].split('T')[0], source: 'gantt' });
                }
            });
            updateEvents('gantt', gantts);
        });

        db.collection("site_status").where("teamId", "==", myTeamId).onSnapshot(ss => {
            let statuses = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                let d1 = parseDateObj(d.date1); let d2 = parseDateObj(d.date2);
                if(d1) statuses.push({ id: doc.id+'_1', type: 'status', title: `[착공] ${d.siteName}`, start: d1, source: 'status' });
                if(d2) statuses.push({ id: doc.id+'_2', type: 'status', title: `[준공] ${d.siteName}`, start: d2, source: 'status' });
            });
            updateEvents('status', statuses);
        });

        db.collection("leave_records").where("teamId","==",myTeamId).where("approved","==",true).onSnapshot(ss => {
            let leaves = [];
            ss.docs.forEach(doc => {
                let d = doc.data();
                let nick = globalEmailToNick[d.userEmail] || d.userEmail.split('@')[0];
                // 💡 V27: 연차, 오전반차, 오후반차 정확한 텍스트 매핑 💡
                leaves.push({ id: doc.id, type: 'leave', leaveType: d.type, title: nick, start: d.date, source: 'leave' });
            });
            updateEvents('leave', leaves);
        });

        db.collection("calendar_events").where("teamId","==",myTeamId).onSnapshot(ss => {
            let customs = ss.docs.map(doc => ({ id: doc.id, ...doc.data(), title: doc.data().text, start: doc.data().startDate, end: doc.data().endDate, source: 'custom' }));
            updateEvents('custom', customs);
        });
    }

    function updateEvents(key, data) {
        eventStorage[key] = data;
        allEvents = [...eventStorage.gantt, ...eventStorage.status, ...eventStorage.leave, ...eventStorage.custom];
        renderCalendar();
    }

    function changeMonth(diff) { currentDate.setMonth(currentDate.getMonth() + diff); selectedDateStr = null; document.getElementById('btnResetDate').style.display='none'; renderCalendar(); }

    function toggleFilter(type) {
        if (type === 'all') { activeFilters.clear(); activeFilters.add('all'); } 
        else {
            activeFilters.delete('all');
            if (activeFilters.has(type)) { activeFilters.delete(type); if(activeFilters.size === 0) activeFilters.add('all'); } 
            else { activeFilters.add(type); }
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            let btnType = btn.getAttribute('data-type');
            if(activeFilters.has(btnType)) {
                btn.classList.replace('btn-outline-secondary', 'btn-primary');
                btn.classList.replace('text-white', 'text-light');
                btn.classList.add('fw-bold');
            } else {
                btn.classList.replace('btn-primary', 'btn-outline-secondary');
                btn.classList.remove('fw-bold', 'text-light');
                btn.classList.add('text-white');
            }
        });
        renderCalendar();
    }

    function renderCalendar() {
        let year = currentDate.getFullYear(), month = currentDate.getMonth();
        document.getElementById('currentMonthDisplay').innerText = `${year}. ${String(month+1).padStart(2,'0')}`;
        let firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let html = '';
        for(let i=0; i<firstDay; i++) html += `<div class="cal-day" style="background:rgba(0,0,0,0.1); cursor:default;"></div>`;
        
        for(let i=1; i<=daysInMonth; i++) {
            let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let dw = new Date(year, month, i).getDay();
            let isSelected = dateStr === selectedDateStr ? 'selected' : '';
            
            let dayEvents = allEvents.filter(ev => {
                if(!activeFilters.has('all') && !activeFilters.has(ev.type)) return false;
                return ev.end ? (dateStr >= ev.start && dateStr <= ev.end) : (dateStr === ev.start);
            });
            
            let visibleEvents = dayEvents;
            let hiddenCount = 0;
            if (dayEvents.length > 4) { visibleEvents = dayEvents.slice(0, 3); hiddenCount = dayEvents.length - 3; }
            
            let badgesHtml = visibleEvents.map(ev => {
                let isStart = (dateStr === ev.start);
                let isEnd = (dateStr === ev.end || !ev.end);
                let isSingle = (!ev.end || ev.start === ev.end);
                
                let roundedClass = isSingle ? 'event-single' : (isStart ? 'event-start' : (isEnd ? 'event-end' : ''));
                let strike = ev.isDone ? 'text-decoration:line-through; opacity:0.5;' : '';
                let bgColor = themeColors[ev.type];
                
                // 💡 V27: 연차 표기 방식 완벽 매핑 💡
                let bgStyle = `background-color: ${bgColor};`;
                let titleText = (isStart || isSingle) ? ev.title : '&nbsp;'; 
                
                if(ev.type === 'leave') {
                    let prefix = ev.leaveType === 'full' ? '[연차]' : (ev.leaveType === 'am' ? '[오전반차]' : '[오후반차]');
                    titleText = `${prefix} ${ev.title}`;
                    
                    if(ev.leaveType === 'am') bgStyle = `background: linear-gradient(to right, ${bgColor} 50%, rgba(128,128,128,0.2) 50%); border: 1px solid ${bgColor};`;
                    else if(ev.leaveType === 'pm') bgStyle = `background: linear-gradient(to right, rgba(128,128,128,0.2) 50%, ${bgColor} 50%); border: 1px solid ${bgColor}; color: ${bgColor}; text-align:right; padding-right:6px;`;
                }
                
                let inlineCheck = '';
                if(ev.source === 'custom' && !ev.end && ev.type !== 'construct') {
                    inlineCheck = `<input type="checkbox" class="cal-inline-check" ${ev.isDone?'checked':''} onclick="event.stopPropagation(); toggleDone('${ev.id}', ${ev.isDone})">`;
                }
                
                return `<div class="event-badge ${roundedClass}" style="${bgStyle} ${strike}">${inlineCheck}${titleText}</div>`;
            }).join('');

            if(hiddenCount > 0) { badgesHtml += `<div class="more-btn" onclick="event.stopPropagation(); selectDate('${dateStr}')">+${hiddenCount} 더보기</div>`; }

            html += `<div class="cal-day ${isSelected}" onclick="selectDate('${dateStr}')"><div class="cal-date-num" style="color:${dw===0?'#e03131':(dw===6?'#5c7cfa':'#94a3b8')}">${i}</div>${badgesHtml}</div>`;
        }
        document.getElementById('calendarGrid').innerHTML = html;
        renderEventList();
    }

    function selectDate(dStr) {
        selectedDateStr = dStr;
        document.getElementById('listTitle').innerHTML = dStr ? `📍 ${dStr} 상세 일정` : `📋 이달의 전체 일정`;
        document.getElementById('btnResetDate').style.display = dStr ? 'inline-block' : 'none';
        renderCalendar();
    }

    function renderEventList() {
        let prefix = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
        let listEvents = allEvents.filter(ev => {
            if(!activeFilters.has('all') && !activeFilters.has(ev.type)) return false;
            if(selectedDateStr) return ev.end ? (selectedDateStr >= ev.start && selectedDateStr <= ev.end) : (ev.start === selectedDateStr);
            return ev.end ? (ev.start.startsWith(prefix) || ev.end.startsWith(prefix)) : ev.start.startsWith(prefix);
        }).sort((a,b) => a.start.localeCompare(b.start));

        let html = listEvents.map(ev => {
            let colorHex = themeColors[ev.type];
            let dateTxt = ev.end ? `${ev.start} ~ ${ev.end}` : ev.start;
            
            // 💡 V27: 하단 리스트에도 연차/반차 텍스트 정확히 노출 💡
            let extTxt = "";
            if(ev.type === 'leave') extTxt = ev.leaveType==='full'?'(종일)':(ev.leaveType==='am'?'(오전반차)':'(오후반차)');

            return `<div class="list-item ${ev.isDone?'done':''}">
                <div class="color-bar" style="background:${colorHex}"></div>
                ${ev.source==='custom' && ev.type !== 'construct' ? `<input type="checkbox" class="custom-check" ${ev.isDone?'checked':''} onclick="toggleDone('${ev.id}', ${ev.isDone})">` : ''}
                <div class="item-content d-flex flex-column flex-grow-1">
                    <span class="small text-secondary">${dateTxt} <span class="text-info">${extTxt}</span></span>
                    <span class="fw-bold text-white" style="color:var(--bs-body-color);">${ev.title}</span>
                </div>
                ${ev.source==='custom' ? `<button class="btn btn-sm text-danger p-0 ms-auto" onclick="deleteCustomEvent('${ev.id}')"><i class="bi bi-trash"></i></button>` : ''}
            </div>`;
        }).join('');
        document.getElementById('eventList').innerHTML = html || `<p class="text-secondary text-center py-4">일정이 없습니다.</p>`;
    }

    function toggleDateInput() {
        let isPeriod = document.getElementById('evType').value === 'construct';
        document.getElementById('date2Container').style.display = isPeriod ? 'block' : 'none';
        document.getElementById('date1Label').innerText = isPeriod ? '시작일' : '날짜';
    }

    function openEventModal() {
        let td = selectedDateStr || new Date().toISOString().split('T')[0];
        document.getElementById('evDate1').value = td; document.getElementById('evDate2').value = td;
        document.getElementById('evText').value = ''; document.getElementById('evType').value = 'memo';
        toggleDateInput(); document.getElementById('eventModal').style.display = 'flex';
    }

    async function saveEvent() {
        let type = document.getElementById('evType').value, d1 = document.getElementById('evDate1').value, d2 = document.getElementById('evDate2').value, txt = document.getElementById('evText').value.trim();
        if(!d1 || !txt) return alert("날짜와 내용을 입력하세요.");
        if(type === 'construct' && d1 > d2) return alert("종료일이 시작일보다 빠를 수 없습니다.");
        await db.collection("calendar_events").add({ teamId: myTeamId, type, startDate: d1, endDate: type === 'construct' ? d2 : null, text: txt, isDone: false, createdAt: Date.now() });
        document.getElementById('eventModal').style.display = 'none';
    }

    async function toggleDone(id, cur) { await db.collection("calendar_events").doc(id).update({ isDone: !cur }); }
    async function deleteCustomEvent(id) { if(confirm("이 일정을 삭제하시겠습니까?")) await db.collection("calendar_events").doc(id).delete(); }

    function captureCalendar() {
        const area = document.getElementById('captureArea');
        const btns = area.querySelectorAll('.btn');
        btns.forEach(b => b.style.display = 'none');
        setTimeout(() => {
            html2canvas(area, { backgroundColor: document.body.classList.contains('light-mode') ? '#ffffff' : '#1e222d', scale: 2 }).then(canvas => {
                btns.forEach(b => b.style.display = 'inline-block');
                let link = document.createElement('a');
                link.download = `스케줄_${currentDate.getFullYear()}_${currentDate.getMonth()+1}.png`;
                link.href = canvas.toDataURL(); link.click();
            });
        }, 100);
    }
    
    function openColorModal() {
        let html = '';
        for(let key in colorNames) {
            html += `<div class="col-6 d-flex align-items-center justify-content-between p-2 rounded" style="background:rgba(255,255,255,0.05);">
                <label class="small fw-bold text-white">${colorNames[key]}</label>
                <input type="color" id="col_${key}" value="${themeColors[key]}" class="form-control form-control-color input-dark p-1" style="width:40px; height:30px; cursor:pointer;">
            </div>`;
        }
        document.getElementById('colorInputContainer').innerHTML = html;
        document.getElementById('colorModal').style.display = 'flex';
    }
    
    async function saveThemeColors() {
        let newColors = {};
        for(let key in colorNames) { newColors[key] = document.getElementById(`col_${key}`).value; }
        await db.collection("teams").doc(myTeamId).update({ themeColors: newColors });
        themeColors = newColors; applyDotColors();
        document.getElementById('colorModal').style.display = 'none'; renderCalendar();
        alert("색상이 변경되었습니다.");
    }
    
    function applyDotColors() {
        for(let key in themeColors) { let el = document.getElementById(`dot-${key}`); if(el) el.style.color = themeColors[key]; }
    }
</script>
</body>
</html>
