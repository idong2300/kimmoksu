<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종합 상황판 TEST - 김목수이야기</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#1e222d">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-deep: #131722; --sidebar-bg: #1e222d; --card-bg: #2a2e39;
            --primary-accent: #5c7cfa; --danger-btn: #e03131; --success-btn: #0ca678;
        }

        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; position: relative; }
        
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.3s; z-index: 1050; overflow-y: auto; }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1040; backdrop-filter: blur(2px); transition: 0.3s; opacity: 0; }
        .sidebar-overlay.active { display: block; opacity: 1; }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); } 
            .main-container { padding: 20px 15px; } 
            .mobile-menu-btn { display: flex !important; } 
        }

        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; cursor: pointer; }

        .page-section { display: none; }
        .page-section.active { display: block; }

        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        
        /* 공지사항 메인 미리보기용 */
        .notice-preview { 
            color: #ced4da; line-height: 1.8; font-size: 0.95rem;
        }
        
        /* 개별 공지사항 아이템 (관리용) */
        .notice-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .notice-text { flex: 1; color: #f8fafc; font-size: 0.95rem; }
        .notice-actions { flex-shrink: 0; margin-left: 15px; }

        /* 상황판 표 스타일 */
        .status-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .status-table th { color: #94a3b8; font-weight: 500; font-size: 0.85rem; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-table td { background: #1e222d; padding: 15px 10px; font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-table tr td:first-child { border-left: 1px solid rgba(255,255,255,0.05); border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .status-table tr td:last-child { border-right: 1px solid rgba(255,255,255,0.05); border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        /* 모바일 카드 스타일 */
        .mobile-site-card { background: #1e222d; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .mobile-site-card .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 2px; }
        .mobile-site-card .value { font-size: 0.95rem; color: #f8fafc; margin-bottom: 10px; font-weight: 500; }

        .btn-edit { color: var(--primary-accent); cursor: pointer; font-size: 1.1rem; padding: 5px; }
        .input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }

        .nav-pills .nav-link { color: #94a3b8; background: transparent; border: 1px solid rgba(255,255,255,0.1); margin-right: 8px; margin-bottom: 8px; font-size: 0.85rem; }
        .nav-pills .nav-link.active { background: var(--primary-accent); color: white; border-color: var(--primary-accent); }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <h3 class="mb-4 fw-bold">현장 관리 접속</h3>
        <input type="email" id="userEmail" class="form-control input-dark mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control input-dark mb-4" placeholder="비밀번호">
        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="handleAuth()">접속하기</button>
    </div>
</div>

<div class="app-wrapper">
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10 mt-2">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px; cursor: pointer;">
        </div>
        <div class="flex-grow-1 mt-3">
            <div class="nav-link active" onclick="showPage('home', this)"><i class="bi bi-house-door"></i> 홈</div>
            <div class="nav-link" onclick="showPage('status', this)"><i class="bi bi-kanban"></i> 진행 상황 관리</div>
        </div>
    </nav>

    <main class="main-container">
        <section id="page-home" class="page-section active">
            <div class="row g-3">
                <div class="col-12">
                    <div class="t5-card" style="cursor: pointer;" onclick="showPage('status', document.querySelectorAll('.nav-link')[1])">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold m-0"><i class="bi bi-megaphone me-2 text-warning"></i>공지사항</h5>
                            <span class="small text-secondary">수정은 상황 관리 페이지에서</span>
                        </div>
                        <div id="mainNoticeDisplay" class="notice-preview">공지사항을 불러오는 중...</div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="t5-card h-100 text-center py-5" onclick="showPage('status', document.querySelectorAll('.nav-link')[1])" style="cursor: pointer;">
                        <i class="bi bi-kanban fs-1 mb-3 d-block text-primary"></i>
                        <h4 class="fw-bold">김목수이야기 진행 상황</h4>
                        <p class="text-secondary small m-0">현장 및 디자인 공정 통합 관리</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-status" class="page-section">
            <h3 class="fw-bold mb-4">현장 및 디자인 관리</h3>

            <div class="t5-card mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold m-0">공지사항 개별 관리</h6>
                </div>
                <div class="d-flex gap-2 mb-3">
                    <input type="text" id="newNoticeInput" class="form-control input-dark py-2" placeholder="새로운 공지사항 입력 (엔터키를 눌러도 추가됩니다)" onkeypress="if(event.keyCode===13) addNotice()">
                    <button class="btn btn-primary fw-bold px-4 text-nowrap" onclick="addNotice()">추가</button>
                </div>
                <div id="notice-list-container"></div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <nav class="nav nav-pills" id="status-tabs">
                    <button class="nav-link active" onclick="loadStatusData('ongoing')">공사 진행 중</button>
                    <button class="nav-link" onclick="loadStatusData('scheduled')">공사 착공 예정</button>
                    <button class="nav-link" onclick="loadStatusData('designing')">디자인 진행 중</button>
                    <button class="nav-link" onclick="loadStatusData('pre-design')">디자인 예정</button>
                </nav>
                <button class="btn btn-success fw-bold" onclick="openAddModal()">+ 현장 추가</button>
            </div>

            <div id="status-content-area">
                <div class="d-none d-md-block">
                    <table class="status-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="d-md-none" id="card-body"></div>
            </div>
        </section>
    </main>

    <button class="mobile-menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
</div>

<div class="modal fade" id="siteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="background: var(--card-bg); border-radius: 20px;">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-4" id="modalTitle">현장 정보 입력</h5>
                <div class="row g-3" id="siteForm">
                    <div class="col-12">
                        <label class="small text-secondary mb-1">진행 단계 (변경 시 해당 탭으로 자동 이동합니다)</label>
                        <select id="f_status" class="form-select input-dark" onchange="toggleFormFields(this.value)">
                            <option value="ongoing">공사 진행 중</option>
                            <option value="scheduled">공사 착공 예정</option>
                            <option value="designing">디자인 진행 중</option>
                            <option value="pre-design">디자인 예정</option>
                        </select>
                    </div>
                    <div class="col-12"><input type="text" id="f_siteName" class="form-control input-dark" placeholder="현장명/상호명"></div>
                    <div class="col-6"><input type="text" id="f_date1" class="form-control input-dark" placeholder="날짜 1"></div>
                    <div class="col-6"><input type="text" id="f_date2" class="form-control input-dark" placeholder="날짜 2"></div>
                    <div class="col-12"><input type="text" id="f_manager" class="form-control input-dark" placeholder="담당 소장/디자이너"></div>
                    <div id="ongoing_only" class="col-12"><input type="text" id="f_designer_sign" class="form-control input-dark" placeholder="싸인 담당"></div>
                    <div class="col-12"><textarea id="f_etc" class="form-control input-dark" rows="3" placeholder="기타 사항"></textarea></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button class="btn btn-secondary w-50 py-2 fw-bold" style="background:#4b5563; border:none;" data-bs-dismiss="modal">취소</button>
                    <button class="btn btn-primary w-50 py-2 fw-bold" onclick="saveSiteData()">저장</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let myEmail, myTeamId, userNickname;
    let editingId = null;
    let currentTab = 'ongoing';
    let siteModal;

    // DOM 로드 후 모달 객체 생성 (안전하게 묶기)
    document.addEventListener("DOMContentLoaded", function() {
        siteModal = new bootstrap.Modal(document.getElementById('siteModal'));
    });

    function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('sidebarOverlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('sidebarOverlay').classList.remove('active'); }
    
    function showPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        closeSidebar();
    }

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get();
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { 
                myTeamId = q.docs[0].id;
                loadNotices(); // 공지사항 로드 (개별 관리 방식)
                loadStatusData('ongoing'); // 상황판 로드
            }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    /* =========================================
       1. 공지사항 로직 (항목별 개별 관리)
    ========================================= */
    function loadNotices() {
        db.collection("notices")
          .where("teamId", "==", myTeamId)
          .orderBy("createdAt", "desc")
          .onSnapshot(ss => {
            const notices = ss.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // 1) 메인 홈 화면 출력 (깔끔하게 상위 5개만 점 찍어서 출력)
            const mainContainer = document.getElementById('mainNoticeDisplay');
            if(notices.length === 0) {
                mainContainer.innerHTML = "등록된 공지사항이 없습니다.";
            } else {
                mainContainer.innerHTML = notices.slice(0, 5).map(n => `• ${n.text}`).join('<br>');
            }

            // 2) 상황판 내부 관리자 영역 출력 (수정/삭제 버튼 포함)
            const listContainer = document.getElementById('notice-list-container');
            if(notices.length === 0) {
                listContainer.innerHTML = "<p class='text-secondary small mt-3'>등록된 공지가 없습니다.</p>";
            } else {
                listContainer.innerHTML = notices.map(n => `
                    <div class="notice-item">
                        <span class="notice-text">${n.text}</span>
                        <div class="notice-actions">
                            <button class="btn btn-sm btn-link text-primary p-1 text-decoration-none" onclick="editNotice('${n.id}', '${n.text.replace(/'/g, "\\'")}')">수정</button>
                            <button class="btn btn-sm btn-link text-danger p-1 text-decoration-none" onclick="deleteNotice('${n.id}')">삭제</button>
                        </div>
                    </div>
                `).join('');
            }
        });
    }

    async function addNotice() {
        const input = document.getElementById('newNoticeInput');
        const text = input.value.trim();
        if(!text) return;
        
        await db.collection("notices").add({
            teamId: myTeamId,
            text: text,
            writer: userNickname,
            createdAt: Date.now()
        });
        input.value = ''; // 입력 후 초기화
    }

    async function editNotice(id, oldText) {
        const newText = prompt("공지사항 수정", oldText);
        if(newText !== null && newText.trim() !== "") {
            await db.collection("notices").doc(id).update({ text: newText.trim() });
        }
    }

    async function deleteNotice(id) {
        if(confirm("이 공지사항을 삭제하시겠습니까?")) {
            await db.collection("notices").doc(id).delete();
        }
    }

    /* =========================================
       2. 상황판 로직 (하이브리드 렌더링)
    ========================================= */
    function loadStatusData(status) {
        currentTab = status;
        document.querySelectorAll('#status-tabs button').forEach(b => b.classList.remove('active'));
        event?.target.classList.add('active');

        db.collection("site_status")
          .where("teamId", "==", myTeamId)
          .where("status", "==", status)
          .onSnapshot(ss => {
            const data = ss.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 등록된 시간 순으로 오름차순 정렬 (먼저 넣은게 위로)
            data.sort((a,b) => a.createdAt - b.createdAt);
            renderStatus(data);
          });
    }

    function renderStatus(data) {
        const tHead = document.getElementById('table-head');
        const tBody = document.getElementById('table-body');
        const cBody = document.getElementById('card-body');
        
        let headHTML = '';
        if(currentTab === 'ongoing') headHTML = '<tr><th>현장명</th><th>착공일</th><th>예정준공일</th><th>소장</th><th>디자이너</th><th>싸인</th><th>비고</th><th></th></tr>';
        else if(currentTab === 'scheduled') headHTML = '<tr><th>상호명</th><th>착공예정</th><th>준공예정</th><th>예상소장</th><th>비고</th><th></th></tr>';
        else if(currentTab === 'designing') headHTML = '<tr><th>상호명</th><th>디자인마감</th><th>착공예정</th><th>디자이너</th><th>비고</th><th></th></tr>';
        else headHTML = '<tr><th>상호명</th><th>마감시기</th><th>비고</th><th></th></tr>';
        
        tHead.innerHTML = headHTML;
        
        if(data.length === 0) {
            tBody.innerHTML = `<tr><td colspan="8" class="text-center text-secondary py-4">등록된 현장이 없습니다.</td></tr>`;
            cBody.innerHTML = `<p class="text-center text-secondary py-4">등록된 현장이 없습니다.</p>`;
            return;
        }

        tBody.innerHTML = data.map(item => `
            <tr>
                <td class="fw-bold">${item.siteName}</td>
                <td>${item.date1 || '-'}</td>
                ${currentTab !== 'pre-design' ? `<td>${item.date2 || '-'}</td>` : ''}
                ${currentTab !== 'pre-design' ? `<td>${item.manager || '-'}</td>` : ''}
                ${currentTab === 'ongoing' ? `<td>${item.designer_sign || '-'}</td>` : ''}
                <td class="text-secondary small">${item.etc || '-'}</td>
                <td class="text-end text-nowrap">
                    <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="openEditModal('${item.id}')">수정</button>
                    <button class="btn btn-sm btn-outline-danger py-0 px-2 ms-1" onclick="deleteSite('${item.id}')">삭제</button>
                </td>
            </tr>
        `).join('');

        cBody.innerHTML = data.map(item => `
            <div class="mobile-site-card">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold text-primary m-0">${item.siteName}</h6>
                    <div>
                        <button class="btn btn-sm text-primary p-1" onclick="openEditModal('${item.id}')"><i class="bi bi-pencil-square"></i></button>
                        <button class="btn btn-sm text-danger p-1" onclick="deleteSite('${item.id}')"><i class="bi bi-trash3"></i></button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-6"><div class="label">${getLabel1()}</div><div class="value">${item.date1 || '-'}</div></div>
                    ${currentTab !== 'pre-design' ? `<div class="col-6"><div class="label">${getLabel2()}</div><div class="value">${item.date2 || '-'}</div></div>` : ''}
                    <div class="col-12"><div class="label">${getLabel3()}</div><div class="value">${item.manager || '-'}</div></div>
                    <div class="col-12"><div class="label">비고</div><div class="value small">${item.etc || '-'}</div></div>
                </div>
            </div>
        `).join('');
    }

    function getLabel1() { return currentTab === 'ongoing' ? '착공일' : (currentTab === 'designing' ? '디자인마감' : '착공예정일'); }
    function getLabel2() { return currentTab === 'ongoing' ? '준공예정' : '착공예정'; }
    function getLabel3() { return currentTab === 'ongoing' ? '담당소장/디자이너' : '담당자'; }

    /* =========================================
       3. 현장 추가/수정/삭제 모달 로직
    ========================================= */
    function openAddModal() {
        editingId = null;
        document.getElementById('modalTitle').innerText = "새로운 현장 추가";
        document.getElementById('siteForm').querySelectorAll('input, textarea').forEach(i => i.value = '');
        document.getElementById('f_status').value = currentTab;
        toggleFormFields(currentTab);
        siteModal.show();
    }

    async function openEditModal(id) {
        editingId = id;
        document.getElementById('modalTitle').innerText = "정보 수정 / 단계 변경";
        const doc = await db.collection("site_status").doc(id).get();
        const d = doc.data();
        document.getElementById('f_status').value = d.status;
        document.getElementById('f_siteName').value = d.siteName;
        document.getElementById('f_date1').value = d.date1 || '';
        document.getElementById('f_date2').value = d.date2 || '';
        document.getElementById('f_manager').value = d.manager || '';
        document.getElementById('f_designer_sign').value = d.designer_sign || '';
        document.getElementById('f_etc').value = d.etc || '';
        toggleFormFields(d.status);
        siteModal.show();
    }

    function toggleFormFields(val) {
        const d1 = document.getElementById('f_date1');
        const d2 = document.getElementById('f_date2');
        const man = document.getElementById('f_manager');
        const sign = document.getElementById('ongoing_only');

        if(val === 'ongoing') {
            d1.placeholder = "착공일"; d2.placeholder = "예정 준공일"; man.placeholder = "현장소장 / 디자이너"; sign.style.display = 'block';
            d2.style.display = 'block'; man.style.display = 'block';
        } else if(val === 'scheduled') {
            d1.placeholder = "착공 예정일"; d2.placeholder = "준공 예정일"; man.placeholder = "예상 소장"; sign.style.display = 'none';
            d2.style.display = 'block'; man.style.display = 'block';
        } else if(val === 'designing') {
            d1.placeholder = "디자인 마감일"; d2.placeholder = "착공 예정일"; man.placeholder = "담당 디자이너"; sign.style.display = 'none';
            d2.style.display = 'block'; man.style.display = 'block';
        } else {
            d1.placeholder = "디자인 마감 시기 (예: 4월 말)"; sign.style.display = 'none'; d2.style.display = 'none'; man.style.display = 'none';
        }
    }

    async function saveSiteData() {
        const data = {
            teamId: myTeamId,
            status: document.getElementById('f_status').value,
            siteName: document.getElementById('f_siteName').value.trim(),
            date1: document.getElementById('f_date1').value,
            date2: document.getElementById('f_date2').value,
            manager: document.getElementById('f_manager').value,
            designer_sign: document.getElementById('f_designer_sign').value,
            etc: document.getElementById('f_etc').value,
            updatedAt: Date.now()
        };
        if(!data.siteName) return alert("현장명(상호명)은 필수입니다.");

        if(editingId) await db.collection("site_status").doc(editingId).update(data);
        else await db.collection("site_status").add({ ...data, createdAt: Date.now() });
        
        siteModal.hide();
        loadStatusData(data.status); 
    }

    async function deleteSite(id) {
        if(confirm("이 현장을 목록에서 삭제하시겠습니까?")) {
            await db.collection("site_status").doc(id).delete();
        }
    }

    async function handleAuth() {
        const e = document.getElementById('userEmail').value.trim();
        const p = document.getElementById('userPw').value.trim();
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }
</script>
</body>
</html>
