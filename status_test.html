<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>종합 상황판 V3 - 김목수이야기</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#1e222d">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root {
            --bg-deep: #131722; --sidebar-bg: #1e222d; --card-bg: #2a2e39;
            --primary-accent: #5c7cfa; --danger-btn: #e03131; --success-btn: #0ca678;
        }

        body { background-color: var(--bg-deep); color: #f8fafc; font-family: 'Pretendard', sans-serif; margin: 0; overflow: hidden; }
        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100vw; position: relative; }
        
        .sidebar { width: 260px; height: 100dvh; background-color: var(--sidebar-bg); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; transition: 0.3s; z-index: 1050; overflow-y: auto; }
        .main-container { flex: 1; overflow-y: auto; background-color: var(--bg-deep); padding: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        .nav-link { color: #94a3b8; padding: 14px 20px; margin: 4px 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; display: flex; align-items: center; text-decoration: none; }
        .nav-link i { font-size: 1.2rem; margin-right: 12px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(92, 124, 250, 0.2); color: var(--primary-accent); font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; transform: translateX(-100%); } 
            .sidebar.active { transform: translateX(0); } 
            .main-container { padding: 20px 15px; } 
            .mobile-menu-btn { display: flex !important; } 
        }

        .mobile-menu-btn { display: none; position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; border-radius: 50%; background-color: var(--primary-accent); color: white; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1030; border: none; font-size: 1.8rem; cursor: pointer; }

        .page-section { display: none; }
        .page-section.active { display: block; }

        .t5-card { background: var(--card-bg); border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; }
        
        /* 공지사항 메인 미리보기용 */
        .notice-preview { color: #ced4da; line-height: 1.8; font-size: 0.95rem; }
        .notice-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--primary-accent); }
        .notice-text { flex: 1; color: #f8fafc; font-size: 0.92rem; }

        /* [수정 2] 상황판 표 간격 최적화 */
        .status-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; table-layout: fixed; }
        .status-table th { color: #94a3b8; font-weight: 600; font-size: 0.82rem; padding: 12px 10px; border-bottom: 2px solid rgba(255,255,255,0.05); text-align: center; white-space: nowrap; }
        .status-table td { background: #1e222d; padding: 12px 10px; font-size: 0.88rem; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-table tr:hover td { background: #252a36; }
        
        /* 모바일 카드 스타일 */
        .mobile-site-card { background: #1e222d; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .mobile-site-card .label { font-size: 0.72rem; color: #94a3b8; margin-bottom: 2px; }
        .mobile-site-card .value { font-size: 0.92rem; color: #f8fafc; margin-bottom: 8px; font-weight: 500; }

        .input-dark { background: #1e222d !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; font-size: 0.9rem !important; }
        .input-dark::placeholder { color: #555 !important; }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-overlay" style="display: none;">
    <div class="login-card">
        <h3 class="mb-4 fw-bold">현장 관리 접속</h3>
        <input type="email" id="userEmail" class="form-control input-dark mb-3" placeholder="이메일">
        <input type="password" id="userPw" class="form-control input-dark mb-4" placeholder="비밀번호">
        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="handleAuth()">접속하기</button>
    </div>
</div>

<div class="app-wrapper">
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-10 mt-2">
            <img src="kimmoksu_main_logo.png" alt="로고" style="max-width: 140px; cursor: pointer;">
        </div>
        <div class="flex-grow-1 mt-3">
            <div class="nav-link active" onclick="showPage('home', this)"><i class="bi bi-house-door"></i> 홈</div>
            <div class="nav-link" onclick="showPage('status', this)"><i class="bi bi-calendar-check"></i> 종합 상황판</div>
        </div>
    </nav>

    <main class="main-container">
        <section id="page-home" class="page-section active">
            <div class="row g-3">
                <div class="col-12">
                    <div class="t5-card" style="cursor: pointer;" onclick="showPage('status', document.querySelectorAll('.nav-link')[1])">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold m-0"><i class="bi bi-megaphone-fill me-2 text-warning"></i>공지사항</h5>
                            <span class="small text-secondary">관리 페이지로 이동 <i class="bi bi-chevron-right"></i></span>
                        </div>
                        <div id="mainNoticeDisplay" class="notice-preview">공지사항을 불러오는 중...</div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="t5-card h-100 text-center py-5" onclick="showPage('status', document.querySelectorAll('.nav-link')[1])" style="cursor: pointer;">
                        <i class="bi bi-grid-3x3-gap-fill fs-1 mb-3 d-block text-primary"></i>
                        <h4 class="fw-bold">김목수이야기 실시간 상황판</h4>
                        <p class="text-secondary small m-0">전체 현장의 공정 단계를 한눈에 관리합니다.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-status" class="page-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">종합 상황판 관리</h3>
                <button class="btn btn-success fw-bold px-4" onclick="openAddModal()">+ 현장 추가</button>
            </div>

            <div class="t5-card mb-5">
                <div class="d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold m-0"><i class="bi bi-gear-fill me-2 text-secondary"></i>공지사항 관리</h6>
                    <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#noticeManagerCollapse">
                        관리창 열기/접기
                    </button>
                </div>
                
                <div class="collapse mt-3" id="noticeManagerCollapse">
                    <div class="d-flex gap-2 mb-4 border-top border-secondary border-opacity-10 pt-3">
                        <input type="text" id="newNoticeInput" class="form-control input-dark py-2" placeholder="새 공지 입력 후 추가 버튼이나 엔터를 누르세요" onkeypress="if(event.keyCode===13) addNotice()">
                        <button class="btn btn-primary fw-bold px-4 text-nowrap" onclick="addNotice()">추가</button>
                    </div>
                    <div id="notice-list-container"></div>
                </div>
            </div>

            <div id="all-status-containers"></div>
        </section>
    </main>

    <button class="mobile-menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
</div>

<div class="modal fade" id="siteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="background: var(--card-bg); border-radius: 20px;">
            <div class="modal-body p-4">
                <h5 class="fw-bold mb-4" id="modalTitle">현장 데이터 입력</h5>
                <div class="row g-3" id="siteForm">
                    <div class="col-12">
                        <label class="small text-secondary mb-1">진행 단계</label>
                        <select id="f_status" class="form-select input-dark" onchange="toggleFormFields(this.value)">
                            <option value="ongoing">공사 진행 중</option>
                            <option value="scheduled">공사 착공 예정</option>
                            <option value="designing">디자인 진행 중</option>
                            <option value="pre-design">디자인 예정</option>
                        </select>
                    </div>
                    <div class="col-12"><input type="text" id="f_siteName" class="form-control input-dark fw-bold" placeholder="상호명 / 현장 명칭"></div>
                    
                    <div class="col-6"><input type="text" id="f_date1" class="form-control input-dark"></div>
                    <div class="col-6"><input type="text" id="f_date2" class="form-control input-dark"></div>
                    
                    <div class="col-6"><input type="text" id="f_site_manager" class="form-control input-dark" placeholder="담당 현장소장"></div>
                    <div class="col-6"><input type="text" id="f_designer" class="form-control input-dark" placeholder="담당 디자이너"></div>
                    
                    <div id="ongoing_only" class="col-12"><input type="text" id="f_designer_sign" class="form-control input-dark" placeholder="싸인(간판) 담당 디자이너"></div>
                    <div class="col-12"><textarea id="f_etc" class="form-control input-dark" rows="3" placeholder="기타 특이사항 및 메모"></textarea></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button class="btn btn-secondary w-50 py-2 fw-bold" style="background:#4b5563; border:none;" data-bs-dismiss="modal">취소</button>
                    <button class="btn btn-primary w-50 py-2 fw-bold" onclick="saveSiteData()">저장하기</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let myEmail, myTeamId, userNickname;
    let editingId = null;
    let siteModal;

    document.addEventListener("DOMContentLoaded", function() {
        siteModal = new bootstrap.Modal(document.getElementById('siteModal'));
    });

    function openSidebar() { document.getElementById('sidebar').classList.add('active'); document.getElementById('sidebarOverlay').classList.add('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); document.getElementById('sidebarOverlay').classList.remove('active'); }
    
    function showPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        closeSidebar();
    }

    auth.onAuthStateChanged(async user => {
        if (user) {
            myEmail = user.email; document.getElementById('auth-overlay').style.display = 'none';
            const uDoc = await db.collection("users").doc(myEmail).get();
            userNickname = uDoc.exists ? uDoc.data().nickname : "관리자";
            const q = await db.collection("teams").where("members", "array-contains", myEmail).get();
            if (!q.empty) { 
                myTeamId = q.docs[0].id;
                loadNotices(); 
                loadAllStatusData();
            }
        } else { document.getElementById('auth-overlay').style.display = 'flex'; }
    });

    /* --- 공지사항 로직 --- */
    function loadNotices() {
        db.collection("notices").where("teamId", "==", myTeamId).orderBy("createdAt", "desc").onSnapshot(ss => {
            const notices = ss.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            document.getElementById('mainNoticeDisplay').innerHTML = notices.length === 0 ? "등록된 공지가 없습니다." : notices.slice(0, 5).map(n => `• ${n.text}`).join('<br>');
            
            document.getElementById('notice-list-container').innerHTML = notices.map(n => `
                <div class="notice-item">
                    <span class="notice-text">${n.text}</span>
                    <div class="dropdown">
                        <button class="btn btn-sm text-secondary border-0 p-1" type="button" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><a class="dropdown-item text-primary" href="#" onclick="editNotice('${n.id}', '${n.text.replace(/'/g, "\\'")}')">수정</a></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="deleteNotice('${n.id}')">삭제</a></li>
                        </ul>
                    </div>
                </div>
            `).join('');
        });
    }

    async function addNotice() {
        const input = document.getElementById('newNoticeInput');
        if(!input.value.trim()) return;
        await db.collection("notices").add({ teamId: myTeamId, text: input.value.trim(), writer: userNickname, createdAt: Date.now() });
        input.value = '';
    }
    async function editNotice(id, oldText) {
        const newText = prompt("수정할 내용을 입력하세요", oldText);
        if(newText) await db.collection("notices").doc(id).update({ text: newText.trim() });
    }
    async function deleteNotice(id) { if(confirm("삭제하시겠습니까?")) await db.collection("notices").doc(id).delete(); }

    /* --- [수정 3] 상황판 로직 (이모지 삭제 및 아이콘화) --- */
    function loadAllStatusData() {
        db.collection("site_status").where("teamId", "==", myTeamId).onSnapshot(ss => {
            const data = ss.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a,b) => a.createdAt - b.createdAt);
            renderAllSections(data);
        });
    }

    function renderAllSections(data) {
        const sections = [
            { key: 'ongoing', icon: 'bi-tools', title: '공사 진행 중', h: '<tr><th style="width:18%;">현장명</th><th style="width:12%;">착공일</th><th style="width:12%;">예정준공일</th><th style="width:12%;">소장</th><th style="width:12%;">디자이너</th><th style="width:12%;">싸인</th><th>비고</th><th style="width:60px;"></th></tr>' },
            { key: 'scheduled', icon: 'bi-calendar-event', title: '공사 착공 예정', h: '<tr><th style="width:20%;">상호명</th><th style="width:15%;">착공예정</th><th style="width:15%;">준공예정</th><th style="width:15%;">예상소장</th><th>비고</th><th style="width:60px;"></th></tr>' },
            { key: 'designing', icon: 'bi-palette', title: '디자인 진행 중', h: '<tr><th style="width:20%;">상호명</th><th style="width:15%;">디자인마감</th><th style="width:15%;">착공예정</th><th style="width:15%;">디자이너</th><th>비고</th><th style="width:60px;"></th></tr>' },
            { key: 'pre-design', icon: 'bi-pencil-square', title: '디자인 예정', h: '<tr><th style="width:25%;">상호명</th><th style="width:20%;">마감시기</th><th>비고</th><th style="width:60px;"></th></tr>' }
        ];

        document.getElementById('all-status-containers').innerHTML = sections.map(sec => {
            const items = data.filter(d => d.status === sec.key);
            let tableRows = items.length === 0 ? `<tr><td colspan="10" class="text-secondary py-4">등록된 데이터가 없습니다.</td></tr>` : items.map(item => `
                <tr>
                    <td class="fw-bold" style="color:var(--primary-accent);">${item.siteName}</td>
                    <td>${item.date1 || '-'}</td>
                    ${sec.key !== 'pre-design' ? `<td>${item.date2 || '-'}</td>` : ''}
                    ${sec.key === 'ongoing' ? `<td>${item.site_manager || '-'}</td><td>${item.designer || '-'}</td><td>${item.designer_sign || '-'}</td>` : ''}
                    ${sec.key === 'scheduled' ? `<td>${item.site_manager || '-'}</td>` : ''}
                    ${sec.key === 'designing' ? `<td>${item.designer || '-'}</td>` : ''}
                    <td class="text-secondary text-start ps-3">${item.etc || '-'}</td>
                    <td><i class="bi bi-pencil-square text-primary cursor-pointer" onclick="openEditModal('${item.id}')"></i></td>
                </tr>
            `).join('');

            let cards = items.length === 0 ? `<p class="text-center text-secondary py-3 small">내역 없음</p>` : items.map(item => `
                <div class="mobile-site-card" onclick="openEditModal('${item.id}')">
                    <div class="d-flex justify-content-between align-items-center mb-2"><h6 class="fw-bold m-0">${item.siteName}</h6><i class="bi bi-chevron-right text-secondary"></i></div>
                    <div class="row g-2">
                        <div class="col-6"><div class="label">일정 1</div><div class="value">${item.date1 || '-'}</div></div>
                        <div class="col-6"><div class="label">일정 2</div><div class="value">${item.date2 || '-'}</div></div>
                    </div>
                </div>
            `).join('');

            return `<div class="mb-5">
                <h5 class="fw-bold mb-3"><i class="bi ${sec.icon} me-2 text-primary"></i>${sec.title} <span class="badge rounded-pill bg-dark ms-2" style="font-size:0.7rem;">${items.length}건</span></h5>
                <div class="d-none d-md-block t5-card p-0 overflow-hidden"><table class="status-table"><thead>${sec.h}</thead><tbody>${tableRows}</tbody></table></div>
                <div class="d-md-none">${cards}</div>
            </div>`;
        }).join('');
    }

    /* --- 모달 제어 로직 --- */
    function openAddModal() {
        editingId = null; document.getElementById('modalTitle').innerText = "신규 현장 등록";
        document.getElementById('siteForm').querySelectorAll('input, textarea').forEach(i => i.value = '');
        document.getElementById('f_status').value = 'ongoing'; toggleFormFields('ongoing');
        siteModal.show();
    }
    async function openEditModal(id) {
        editingId = id; document.getElementById('modalTitle').innerText = "데이터 수정 및 단계 변경";
        const d = (await db.collection("site_status").doc(id).get()).data();
        document.getElementById('f_status').value = d.status;
        document.getElementById('f_siteName').value = d.siteName;
        document.getElementById('f_date1').value = d.date1 || '';
        document.getElementById('f_date2').value = d.date2 || '';
        document.getElementById('f_site_manager').value = d.site_manager || '';
        document.getElementById('f_designer').value = d.designer || '';
        document.getElementById('f_designer_sign').value = d.designer_sign || '';
        document.getElementById('f_etc').value = d.etc || '';
        toggleFormFields(d.status); siteModal.show();
    }

    function toggleFormFields(val) {
        const d1 = document.getElementById('f_date1'), d2 = document.getElementById('f_date2');
        const siteM = document.getElementById('f_site_manager'), desM = document.getElementById('f_designer');
        const signM = document.getElementById('ongoing_only');

        if(val === 'ongoing') {
            d1.placeholder = "착공일"; d2.placeholder = "준공예정일"; siteM.parentElement.style.display = 'block'; desM.parentElement.style.display = 'block'; signM.style.display = 'block';
        } else if(val === 'scheduled') {
            d1.placeholder = "착공예정"; d2.placeholder = "준공예정"; siteM.parentElement.style.display = 'block'; desM.parentElement.style.display = 'none'; signM.style.display = 'none';
        } else if(val === 'designing') {
            d1.placeholder = "디자인마감"; d2.placeholder = "착공예정"; siteM.parentElement.style.display = 'none'; desM.parentElement.style.display = 'block'; signM.style.display = 'none';
        } else {
            d1.placeholder = "마감시기 (예: 4월 말)"; d2.style.display = 'none'; siteM.parentElement.style.display = 'none'; desM.parentElement.style.display = 'none'; signM.style.display = 'none';
        }
    }

    async function saveSiteData() {
        const data = {
            teamId: myTeamId, status: document.getElementById('f_status').value, siteName: document.getElementById('f_siteName').value.trim(),
            date1: document.getElementById('f_date1').value, date2: document.getElementById('f_date2').value,
            site_manager: document.getElementById('f_site_manager').value, designer: document.getElementById('f_designer').value,
            designer_sign: document.getElementById('f_designer_sign').value, etc: document.getElementById('f_etc').value, updatedAt: Date.now()
        };
        if(!data.siteName) return alert("현장명을 입력해주세요.");
        if(editingId) await db.collection("site_status").doc(editingId).update(data);
        else await db.collection("site_status").add({ ...data, createdAt: Date.now() });
        siteModal.hide();
    }

    async function handleAuth() {
        const e = document.getElementById('userEmail').value.trim(), p = document.getElementById('userPw').value.trim();
        try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
    }
</script>
</body>
</html>
